<!doctype html>
<!-- Previously: default theme was "light". Changed to "neon" for brand identity. -->
<html lang="de" data-theme="neon">
    <!--
  ╔═══════════════════════════════════════════════════════════════╗
  ║  Prompt Composer v0.1.0 — Modular AI Prompt Builder           ║
  ╚═══════════════════════════════════════════════════════════════╝

  WHAT: A guided tool for assembling structured AI prompts.
  HOW:  Open this file in any modern browser. That's it.

  REQUIREMENTS:
  - Any modern browser (Chrome 90+, Firefox 90+, Safari 15+, Edge 90+)
  - No server, no internet, no installation needed
  - Works via file:// (double-click) or any HTTP server

  FEATURES:
  - 11 project types x 3-6 phases (Script, Repo, Text, Mail, Data, etc.)
  - 3 themes: Light, Dark, Neon (Cyberpunk)
  - 2 UI languages (DE/EN), 15 output languages
  - Favorites, history (last 10), 12 modifiers
  - Variable system with inline hints
  - Prompt quality warnings (5 antipatterns)
  - Edit mode: customize prompts (override-layer, defaults preserved)
  - Export/Import all settings as JSON

  DATA STORAGE:
  - All data in browser localStorage (keys: pc-theme, pc-lang, pc-vars, etc.)
  - Nothing leaves your browser. No external requests.
  - Back up via Settings > Export.

  FOR DEVELOPERS:
  - Source: src/style.css, src/data.js, src/app.js, src/template.html
  - Build: python3 build.py
  - Libraries: Alpine.js v3.15.8 + marked.js v17.0.5 (in lib/)
  - Smoke tests: add ?dev_tests to URL
-->
    <head>
        <!-- FOUC prevention: detect theme before any CSS renders.
     Previously placed before <head> (invalid HTML). Moved inside <head>
     as first element — browsers execute <script> in <head> before
     rendering any content, achieving the same flash-free effect. -->
        <!-- FOUC prevention with Safari file:// safety.
     Previously: raw localStorage.getItem crashed on Safari file://.
     Fix: try/catch falls back to OS preference detection. -->
        <script>
            (function () {
                try {
                    var t = localStorage.getItem("pc-theme");
                } catch (e) {
                    t = null;
                } // Previously: defaulted to light/dark based on OS preference.
                // Changed: default to 'neon' as the brand theme.
                if (!t) t = "neon";
                document.documentElement.setAttribute("data-theme", t);
            })();
        </script>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1.0" />
        <title>Prompt Composer</title>
        <style>
            /* __CSS__ */
        </style>
    </head>
    <body>
        <script>
            // === marked.js v17.0.5 (UMD) ===
            /* __MARKED_JS__ */
        </script>

        <script>
            /* __DATA__ */
        </script>

        <script>
            /* __APP__ */
        </script>

        <!-- ═══════════════════════════════════════════════ -->
        <!-- APP LAYOUT                                      -->
        <!-- ═══════════════════════════════════════════════ -->
        <div x-data="composer">
            <!-- Screen reader announcer for step changes.
     Research: WCAG SC 2.4.3, VA.gov Design System, ESDC Multi-Step Forms.
     Previously: no SR announcement on step changes — users didn't know
     which step they were on. -->
            <!-- Safari file:// warning — shown only when in-memory fallback is active -->
            <template
                x-if="typeof storage !== 'undefined' && storage._isMemory"
            >
                <div
                    style="
                        background: var(--warn);
                        color: #000;
                        padding: 6px 12px;
                        font-size: 11px;
                        text-align: center;
                    "
                >
                    ⚠ localStorage unavailable (Safari file://). Settings will
                    not persist. Use Export to save your data.
                </div>
            </template>
            <div
                id="sr-announcer"
                aria-live="polite"
                role="status"
                class="sr-only"
            ></div>

            <div class="app">
                <!-- ═══ MAIN AREA ═══ -->
                <div class="app__main">
                    <!-- Top Bar -->
                    <div class="topbar">
                        <!-- Previously: brand text was not clickable. Standard UX pattern:
       logo/title = home link. -->
                        <span
                            class="topbar__brand"
                            @click="goHome()"
                            style="cursor: pointer"
                            role="button"
                            tabindex="0"
                            @keydown.enter="goHome()"
                            aria-label="Home"
                            ><span x-text="t('app.title')"></span>
                            <span
                                class="text-xs text-faint"
                                x-text="'v'+APP_VERSION"
                            ></span
                        ></span>
                        <div class="topbar__actions">
                            <!-- Output Language -->
                            <div class="lang-sel" x-show="step>=4">
                                <span
                                    x-text="t('settings.out_lang')+':'"
                                ></span>
                                <select
                                    :value="$store.settings.outputLang"
                                    @change="$store.settings.setOutputLang($event.target.value)"
                                >
                                    <template
                                        x-for="l in LANGUAGES"
                                        :key="l.code"
                                    >
                                        <option
                                            :value="l.code"
                                            x-text="l.label"
                                            :selected="l.code===$store.settings.outputLang"
                                        ></option>
                                    </template>
                                </select>
                            </div>
                            <div
                                style="
                                    width: 1px;
                                    height: 16px;
                                    background: var(--bd);
                                    flex-shrink: 0;
                                "
                                x-show="step>=4"
                            ></div>
                            <!-- UI Language -->
                            <button
                                class="btn btn--ghost btn--sm"
                                @click="$store.i18n.setLocale($store.i18n.locale==='de'?'en':'de')"
                                x-text="$store.i18n.locale==='de'?'EN':'DE'"
                            ></button>
                            <!-- Theme -->
                            <!-- Previously: theme cycle button required 3 clicks to go back.
         Fix: dropdown select for direct theme access (4 themes). -->
                            <!-- Previously: :value on <select> didn't reactively select the current option
         in Alpine.js. Fix: :selected on each <option> ensures the dropdown always
         reflects the current theme. Options include short text labels for
         screenreaders and non-emoji systems. -->
                            <select
                                class="btn btn--ghost btn--sm"
                                style="
                                    cursor: pointer;
                                    padding: 2px 4px;
                                    min-width: 0;
                                "
                                @change="$store.theme.set($event.target.value)"
                                :aria-label="t('settings.theme')"
                            >
                                <option
                                    value="light"
                                    :selected="$store.theme.mode==='light'"
                                >
                                    ☀️ Light
                                </option>
                                <option
                                    value="dark"
                                    :selected="$store.theme.mode==='dark'"
                                >
                                    🌙 Dark
                                </option>
                                <option
                                    value="neon"
                                    :selected="$store.theme.mode==='neon'"
                                >
                                    ✨ Neon
                                </option>
                                <option
                                    value="high-contrast"
                                    :selected="$store.theme.mode==='high-contrast'"
                                >
                                    ♿ A11y
                                </option>
                            </select>
                            <!-- Plugins -->
                            <button
                                class="btn btn--ghost btn--sm"
                                @click="showPlugins=true"
                            >
                                🧩
                            </button>
                            <!-- Edit Mode -->
                            <button
                                class="btn btn--ghost btn--sm"
                                @click="toggleEditMode()"
                                :class="{'text-ac':editMode}"
                                x-text="editMode?'✏️':'✏️'"
                            ></button>
                            <!-- Settings -->
                            <button
                                class="btn btn--ghost btn--sm"
                                @click="showSettings=true"
                            >
                                ⚙
                            </button>
                            <!-- Previously: used window.innerWidth in :style which is not reactive.
         Fix: use a CSS class that responds to media queries. -->
                            <button
                                class="btn btn--ghost btn--sm"
                                x-show="!$store.layout.isDesktop"
                                @click="$store.layout.togglePreview()"
                            >
                                📋
                            </button>
                        </div>
                    </div>

                    <!-- Step Indicator (only when in funnel) -->
                    <template x-if="step>=1">
                        <div>
                            <div class="steps">
                                <div
                                    class="sdot"
                                    :class="{'sdot--on':step===1,'sdot--done':step>1}"
                                    :aria-current="step===1?'step':false"
                                    @click="goToStep(1)"
                                >
                                    1
                                </div>
                                <div
                                    class="sline"
                                    :class="{'sline--done':step>1}"
                                ></div>
                                <div
                                    class="sdot"
                                    :class="{'sdot--on':step===2,'sdot--done':step>2}"
                                    :aria-current="step===2?'step':false"
                                    @click="goToStep(2)"
                                >
                                    2
                                </div>
                                <div
                                    class="sline"
                                    :class="{'sline--done':step>2}"
                                ></div>
                                <div
                                    class="sdot"
                                    :class="{'sdot--on':step===3||step===4}"
                                    :aria-current="step>=3?'step':false"
                                    @click="step>=3?goToStep(step):null"
                                >
                                    3
                                </div>
                            </div>
                            <div class="slabels">
                                <span
                                    :class="{'on':step===1}"
                                    x-text="t('step.type')"
                                ></span>
                                <span
                                    :class="{'on':step===2}"
                                    x-text="t('step.phase')"
                                ></span>
                                <span
                                    :class="{'on':step>=3}"
                                    x-text="t('step.configure')"
                                ></span>
                            </div>
                        </div>
                    </template>

                    <!-- Content Area -->
                    <div class="pb">
                        <!-- HOME (step 0) -->
                        <template x-if="step===0">
                            <div>
                                <h2
                                    style="
                                        font-size: 18px;
                                        font-weight: 700;
                                        margin-bottom: 2px;
                                        font-family: var(--font-h);
                                    "
                                    x-text="t('home.welcome')"
                                ></h2>
                                <p
                                    class="text-sm text-muted mb-3"
                                    x-text="t('home.quick_start')"
                                ></p>

                                <!-- Favorites -->
                                <template x-if="$store.favs.items.length>0">
                                    <div class="home-section">
                                        <div class="home-section__t">
                                            ⭐
                                            <span
                                                x-text="t('favs.title')"
                                            ></span>
                                        </div>
                                        <template
                                            x-for="fav in $store.favs.items"
                                            :key="fav.id"
                                        >
                                            <div
                                                class="hi"
                                                @click="loadConfig(fav.config)"
                                            >
                                                <span
                                                    style="font-size: 16px"
                                                    x-text="fav.typeIcon"
                                                ></span>
                                                <div class="flex-1">
                                                    <div
                                                        style="
                                                            font-size: 12px;
                                                            font-weight: 600;
                                                        "
                                                        x-text="fav.name"
                                                    ></div>
                                                    <div
                                                        class="text-xs text-faint"
                                                        x-text="fav.typeName+' → '+fav.phaseName"
                                                    ></div>
                                                </div>
                                                <button
                                                    class="btn btn--ghost btn--sm"
                                                    @click.stop="$store.favs.remove(fav.id)"
                                                    style="color: var(--err)"
                                                >
                                                    ✕
                                                </button>
                                            </div>
                                        </template>
                                    </div>
                                </template>

                                <!-- History -->
                                <template x-if="$store.history.items.length>0">
                                    <div class="home-section">
                                        <div class="home-section__t">
                                            🕐
                                            <span
                                                x-text="t('hist.title')"
                                            ></span>
                                        </div>
                                        <template
                                            x-for="(h,i) in $store.history.items"
                                            :key="i"
                                        >
                                            <div
                                                class="hi"
                                                @click="loadConfig(h.config)"
                                            >
                                                <span
                                                    style="font-size: 14px"
                                                    x-text="h.typeIcon"
                                                ></span>
                                                <div class="flex-1">
                                                    <div
                                                        class="hi__preview"
                                                        x-text="h.preview"
                                                    ></div>
                                                    <div
                                                        class="text-xs text-faint mt-1"
                                                    >
                                                        <span
                                                            class="tag"
                                                            x-text="h.typeName"
                                                        ></span>
                                                        <span
                                                            x-text="relTime(h.ts)"
                                                        ></span>
                                                    </div>
                                                </div>
                                            </div>
                                        </template>
                                    </div>
                                </template>

                                <!-- Previously: a separate "Start" button required an extra click
       before seeing project types. Now types are shown directly on home. -->
                                <div
                                    class="sl mt-3"
                                    x-text="t('step1.title')"
                                ></div>
                                <div class="cards">
                                    <!-- In edit mode: show hidden types with reduced opacity and toggle button -->
                                    <template
                                        x-for="tp in editMode ? [...allTypes, ...TYPES.filter(t=>$store.custom.isHidden(t.id))] : allTypes"
                                        :key="tp.id"
                                    >
                                        <div
                                            class="card"
                                            @click="selectType(tp.id)"
                                        >
                                            <span
                                                class="card__i"
                                                x-text="tp.icon"
                                            ></span>
                                            <span
                                                class="card__t"
                                                x-text="tl(tp)"
                                            ></span>
                                            <span
                                                class="card__d"
                                                x-text="dl(tp)"
                                            ></span>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </template>

                        <!-- STEP 1: Project Type -->
                        <template x-if="step===1">
                            <div>
                                <button class="back" @click="goHome()">
                                    ← <span x-text="t('common.back')"></span>
                                </button>
                                <h2
                                    style="
                                        font-size: 18px;
                                        font-weight: 700;
                                        margin-bottom: 2px;
                                        font-family: var(--font-h);
                                    "
                                    x-text="t('step1.title')"
                                ></h2>
                                <p
                                    class="text-sm text-muted mb-3"
                                    x-text="t('step1.desc')"
                                ></p>
                                <div class="cards">
                                    <!-- In edit mode: show hidden types with reduced opacity and toggle button -->
                                    <template
                                        x-for="tp in editMode ? [...allTypes, ...TYPES.filter(t=>$store.custom.isHidden(t.id))] : allTypes"
                                        :key="tp.id"
                                    >
                                        <div
                                            class="card"
                                            :class="{'card--on':projectType===tp.id}"
                                            @click="selectType(tp.id)"
                                        >
                                            <span
                                                class="card__i"
                                                x-text="tp.icon"
                                            ></span>
                                            <span
                                                class="card__t"
                                                x-text="tl(tp)"
                                            ></span>
                                            <span
                                                class="card__d"
                                                x-text="dl(tp)"
                                            ></span>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </template>

                        <!-- STEP 2: Phase -->
                        <template x-if="step===2">
                            <div>
                                <button class="back" @click="goBack()">
                                    ← <span x-text="t('common.back')"></span>
                                </button>
                                <h2
                                    style="
                                        font-size: 18px;
                                        font-weight: 700;
                                        margin-bottom: 2px;
                                        font-family: var(--font-h);
                                    "
                                    x-text="t('step2.title')"
                                ></h2>
                                <p class="text-sm text-muted mb-3">
                                    <span
                                        x-text="typeObj?tl(typeObj):''"
                                    ></span>
                                    — <span x-text="t('step2.desc')"></span>
                                </p>
                                <div class="cards">
                                    <template x-for="ph in phases" :key="ph.id">
                                        <div
                                            class="card"
                                            @click="selectPhase(ph.id)"
                                        >
                                            <span
                                                class="card__i"
                                                x-text="ph.icon"
                                            ></span>
                                            <span
                                                class="card__t"
                                                x-text="tl(ph)"
                                            ></span>
                                            <span
                                                class="card__d"
                                                x-text="dl(ph)"
                                            ></span>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </template>

                        <!-- STEP 3: Quick Questions -->
                        <template x-if="step===3 && questions">
                            <div>
                                <button class="back" @click="goBack()">
                                    ← <span x-text="t('common.back')"></span>
                                </button>
                                <h2
                                    style="
                                        font-size: 18px;
                                        font-weight: 700;
                                        margin-bottom: 2px;
                                        font-family: var(--font-h);
                                    "
                                    x-text="t('step3.title')"
                                ></h2>
                                <p
                                    class="text-sm text-muted mb-3"
                                    x-text="$store.i18n.locale==='en'?questions.q.de:questions.q.dk"
                                ></p>
                                <div
                                    class="cards"
                                    style="
                                        grid-template-columns: repeat(
                                            auto-fill,
                                            minmax(140px, 1fr)
                                        );
                                    "
                                >
                                    <template
                                        x-for="opt in questions.opts"
                                        :key="opt.id"
                                    >
                                        <div
                                            class="card"
                                            style="padding: 10px"
                                            :class="{'card--on': questions.multi ? questionAnswers[opt.id] : questionAnswers._selected===opt.id}"
                                            @click="if(questions.multi){questionAnswers[opt.id]=!questionAnswers[opt.id]}else{questionAnswers._selected=opt.id}"
                                        >
                                            <span
                                                class="card__t"
                                                style="font-size: 12px"
                                                x-text="$store.i18n.locale==='en'?opt.le:opt.lk"
                                            ></span>
                                        </div>
                                    </template>
                                </div>
                                <div class="flex gap-2 mt-3">
                                    <button
                                        class="btn btn--p btn--lg flex-1"
                                        @click="submitQuestions()"
                                    >
                                        →
                                        <span
                                            x-text="t('step.configure')"
                                        ></span>
                                    </button>
                                    <button
                                        class="btn btn--lg"
                                        @click="skipQuestions()"
                                        x-text="t('common.skip')"
                                    ></button>
                                </div>
                            </div>
                        </template>

                        <!-- STEP 4: Configure -->
                        <template x-if="step===4">
                            <div>
                                <button class="back" @click="goBack()">
                                    ← <span x-text="t('common.back')"></span>
                                </button>

                                <div
                                    class="flex items-center justify-between mb-3"
                                    style="flex-wrap: wrap; gap: 8px"
                                >
                                    <div>
                                        <h2
                                            style="
                                                font-size: 18px;
                                                font-weight: 700;
                                                margin-bottom: 1px;
                                                font-family: var(--font-h);
                                            "
                                            x-text="t('step4.title')"
                                        ></h2>
                                        <p class="text-xs text-muted">
                                            <span
                                                x-text="typeObj?tl(typeObj):''"
                                            ></span>
                                            →
                                            <span
                                                x-text="phaseObj?tl(phaseObj):''"
                                            ></span>
                                        </p>
                                    </div>
                                    <div class="flex gap-1">
                                        <button
                                            class="btn btn--sm"
                                            @click="showFavSave=true"
                                        >
                                            ⭐
                                            <span
                                                x-text="t('favs.save')"
                                            ></span>
                                        </button>
                                        <button
                                            class="btn btn--sm"
                                            x-show="editMode"
                                            @click="openEditPanel({type:'prompt',routeKey:routeKey})"
                                            style="color: var(--ac2)"
                                        >
                                            ✏️ Edit Prompt
                                        </button>
                                        <button
                                            id="btn-copy"
                                            class="btn btn--p btn--lg"
                                            @click="doCopy()"
                                        >
                                            ⎘
                                            <span
                                                x-text="t('common.copy')"
                                            ></span>
                                        </button>
                                    </div>
                                </div>

                                <!-- Variables in this prompt — with inline hints -->
                                <!-- Research (NNGroup/Baymard/Material Design 3): inline supporting text
       below fields is the most effective help pattern. Placeholder as sole
       help is an anti-pattern (7 documented usability problems). -->
                                <template
                                    x-if="extractVars(currentPrompt).filter(v=>v!=='lang'&&v!=='country').length>0"
                                >
                                    <div class="mb-3">
                                        <div
                                            class="sl"
                                            x-text="t('config.variables')"
                                        ></div>
                                        <template
                                            x-for="v in extractVars(currentPrompt).filter(v=>v!=='lang'&&v!=='country')"
                                            :key="v"
                                        >
                                            <div class="fg">
                                                <label
                                                    class="fl"
                                                    x-text="getVarHint(v).label"
                                                ></label>
                                                <input
                                                    type="text"
                                                    class="fi"
                                                    :value="$store.settings.vars[v]||''"
                                                    @input.debounce.200ms="$store.settings.setVar(v,$event.target.value)"
                                                    :placeholder="getVarHint(v).example"
                                                />
                                                <div
                                                    class="var-hint"
                                                    x-show="getVarHint(v).hint"
                                                    x-text="getVarHint(v).hint"
                                                ></div>
                                            </div>
                                        </template>
                                    </div>
                                </template>

                                <!-- Prompt Fields — per-route form inputs for (placeholder) text.
       Previously: placeholders like "(describe goal)" stayed as raw text
       in the prompt. Users had to find and replace them manually.
       Fix: extract as form fields, replace in prompt when filled. -->
                                <template
                                    x-if="extractFields(rawPrompt).length > 0"
                                >
                                    <div class="mb-3">
                                        <div
                                            class="sl"
                                            x-text="t('config.fields')"
                                        ></div>
                                        <template
                                            x-for="f in extractFields(rawPrompt)"
                                            :key="f.key"
                                        >
                                            <div class="fg">
                                                <!-- Bilingual field label: German translation + English original.
               Previously: only English label shown, confusing for DE users.
               Fix: show both so users understand AND can map to prompt. -->
                                                <label class="fl"
                                                    ><span
                                                        x-show="$store.i18n.locale!=='en' && FIELD_LABELS_DE[f.label]"
                                                        x-text="FIELD_LABELS_DE[f.label]"
                                                        style="
                                                            margin-right: 4px;
                                                        "
                                                    ></span
                                                    ><span
                                                        x-show="$store.i18n.locale!=='en' && FIELD_LABELS_DE[f.label]"
                                                        class="text-faint"
                                                        x-text="'/ '+f.label"
                                                    ></span
                                                    ><span
                                                        x-show="$store.i18n.locale==='en' || !FIELD_LABELS_DE[f.label]"
                                                        x-text="f.label"
                                                    ></span
                                                ></label>
                                                <input
                                                    type="text"
                                                    class="fi"
                                                    :value="promptFields[f.key] || ''"
                                                    @input.debounce.300ms="promptFields[f.key]=$event.target.value"
                                                    :placeholder="$store.i18n.locale!=='en' && FIELD_HINTS_DE[f.hint] ? FIELD_HINTS_DE[f.hint] : f.hint"
                                                />
                                                <!-- Previously: hints were always English. Fix: show German translation
               when locale is DE, with English fallback. -->
                                                <div
                                                    class="var-hint"
                                                    x-text="$store.i18n.locale!=='en' && FIELD_HINTS_DE[f.hint] ? FIELD_HINTS_DE[f.hint] : f.hint"
                                                ></div>
                                            </div>
                                        </template>
                                    </div>
                                </template>

                                <!-- Progressive Disclosure: Advanced options (sections, modifiers, extra).
       Research (Baymard Institute): 18+ options exceeds thresholds. -->
                                <button
                                    class="btn btn--sm w-full mb-3"
                                    @click="showAdvanced=!showAdvanced"
                                >
                                    <span
                                        x-text="showAdvanced ? '\u25be '+t('config.hide_advanced') : '\u25b8 '+t('config.show_advanced')"
                                    ></span>
                                    <template
                                        x-if="!showAdvanced && Object.values(modState).filter(Boolean).length>0"
                                    >
                                        <span
                                            style="
                                                background: var(--ac);
                                                color: var(--ac-tx);

                                <template
                                    x-if="showAdvanced && route.optMap && Object.keys(route.optMap).length > 0"

                                        <div
                                            class="sl"
                                            x-text="t('config.optimize_for')"

                                            x-for="[id,mod] in Object.entries(MODIFIERS)"
                                            :key="id"
                                        >
                                            <label
                                                class="mod"
                                                :class="{'mod--on':modState[id]}"
                                                @click="toggleMod(id)"
                                            >
                                                <span x-text="mod.icon"></span>
                                                <span
                                                    x-text="$store.i18n.locale==='en'?mod.le:mod.lk"
                                                ></span>
                                            </label>
                                        </template>
                                    </div>
                                </div>

                                <div class="mb-3" x-show="showAdvanced">
                                    <div
                                        class="sl"
                                        x-text="t('config.extra')"
                                    ></div>
                                    <textarea
                                        class="fi fi--mono"
                                        x-model.debounce.300ms="extra"
                                        :placeholder="t('config.extra_ph')"
                                        rows="3"
                                    ></textarea>
                                </div>

                                <template x-if="currentQuality.length>0">
                                    <div
                                        class="mb-3"
                                        style="
                                            padding: 8px 10px;
                                            border: 1px solid var(--warn);
                                            border-radius: 5px;
                                            background: rgba(217, 119, 6, 0.06);
                                        "
                                    >
                                        <div
                                            style="
                                                font-size: 11px;
                                                font-weight: 600;
                                                color: var(--warn);
                                                margin-bottom: 4px;
                                            "
                                            x-text="t('quality.title')"

                                        <template
                                            x-for="w in currentQuality"
                                            :key="w"
                                        >
                                            <div
                                                style="
                                                    font-size: 11px;
                                                    color: var(--tx-m);
                                                    padding: 1px 0;
                                                "
                                            >
                                                &#9888;
                                                <span x-text="t(w)"></span>
                                            </div>
                                        </template>
                                    </div>
                                </template>
                                <template
                                    x-if="currentQuality.length===0 && currentPrompt.length>100"

                                    <div
                                        class="mb-3"
                                        style="
                                            padding: 6px 10px;
                                            border: 1px solid var(--ok);
                                            border-radius: 5px;
                                            background: rgba(22, 163, 74, 0.06);
                                            font-size: 11px;
                                            color: var(--ok);
                                        "
                                    >
                                        &#10003;
                                        <span x-text="t('quality.good')"></span>
                                    </div>

                                        class="btn btn--sm"

                                        ⭐
                                    </button>
                                    <button

                                        @click="doCopy()"

                                        ⎘

                                    </button>

                </div>

                <!-- ═══ PREVIEW PANEL ═══ -->
                <aside
                    class="app__preview"
                    :class="{'app__preview--show':$store.layout.showMobilePreview}"
                >
                    <div class="ph">
                        <span class="ph__t" x-text="t('preview.title')"></span>
                        <div class="flex gap-1">
                            <template x-if="step>=4">
                                <button
                                    class="btn btn--p btn--sm"

                                    ⎘ <span x-text="t('common.copy')"></span>
                                </button>
                            </template>
                            <button
                                class="btn btn--ghost btn--sm"
                                @click="$store.layout.showMobilePreview=false"

                                ✕

                        </div>
                    </div>

                        </template>
                        <template x-if="step<4">
                            <div
                                style="
                                    display: flex;
                                    flex-direction: column;

                                    justify-content: center;
                                    height: 100%;
                                    color: var(--tx-f);
                                    text-align: center;
                                    padding: 24px;
                                    gap: 6px;
                                "

                                <div style="font-size: 28px; opacity: 0.4">
                                    📋
                                </div>
                                <p
                                    style="font-size: 13px"
                                    x-text="t('preview.title')"
                                ></p>
                                <p
                                    style="font-size: 11px"
                                    x-text="t('preview.empty')"
                                ></p>
                            </div>
                        </template>
                    </div>
                </aside>
            </div>
            <!-- /app -->

            <!-- ═══ TOAST ═══ -->
            <div
                x-show="toast"
                x-cloak
                class="toast"
                x-text="t('common.copied')"
            ></div>

            <template x-if="showChangelog">
                <div
                    class="mov"
                    @keydown.tab="trapTab($event)"
                    role="dialog"
                    aria-modal="true"
                    @click.self="showChangelog=false"
                    @keydown.escape.window="showChangelog=false"
                >
                    <div class="modal">
                        <div
                            class="modal__t"
                            x-text="t('changelog.title')"
                        ></div>
                        <p class="text-sm text-muted mb-2">
                            Prompt Composer
                            <span
                                x-text="t('changelog.updated')+' '+changelogVersion"
                            ></span>
                        </p>
                        <ul style="padding-left: 1.4em; margin-bottom: 12px">
                            <template
                                x-for="item in changelogItems"
                                :key="item"
                            >
                                <li
                                    style="
                                        font-size: 12px;
                                        margin-bottom: 3px;
                                        color: var(--tx-m);
                                    "
                                    x-text="item"
                                ></li>
                            </template>
                        </ul>
                        <button
                            class="btn btn--p w-full"
                            @click="showChangelog=false"
                            x-text="t('common.close')"
                        ></button>
                    </div>
                </div>
            </template>

            <!-- ═══ EDIT PANEL (Side Panel) ═══ -->
            <!-- Research: Side-Panel pattern (Airtable/Typeform/Zapier) is the industry
     standard for wizard-builder editing. Maintains context while providing
     enough space for configuration. -->
            <template x-if="editMode && editPanelOpen && editTarget">
                <div
                    class="mov"
                    @keydown.tab="trapTab($event)"
                    role="dialog"
                    aria-modal="true"
                    @click.self="editPanelOpen=false"
                    @keydown.escape.window="editPanelOpen=false"
                >
                    <div
                        class="modal"
                        style="max-width: 600px; max-height: 90vh"
                    >
                        <div class="flex items-center justify-between mb-3">
                            <div class="modal__t" style="margin: 0">
                                <span
                                    x-text="editTarget?.type==='prompt' ? 'Edit Prompt Template' : 'Edit'"
                                ></span>
                            </div>
                            <div class="flex gap-1">
                                <template
                                    x-if="editTarget?.type==='prompt' && $store.custom.getPromptOverride(editTarget.routeKey)"
                                >
                                    <button
                                        class="btn btn--sm btn--danger"
                                        @click="$store.custom.clearOverride(editTarget.routeKey);editPanelOpen=false"
                                    >
                                        Reset to Default
                                    </button>
                                </template>
                                <button
                                    class="btn btn--ghost"
                                    @click="editPanelOpen=false"
                                >
                                    ✕
                                </button>
                            </div>
                        </div>

                        <!-- Prompt Template Editor -->
                        <template x-if="editTarget?.type==='prompt'">
                            <div>
                                <p
                                    class="text-xs text-muted mb-2"
                                    x-text="editTarget.routeKey"
                                ></p>
                                <!-- Previously: :value+@input caused cursor position jumps during editing.
               Fix: x-data creates a local editable copy, synced to store on input. -->
                                <div
                                    x-data="{editText: $store.custom.getPromptOverride(editTarget.routeKey) || assembleDefaultPrompt(editTarget.routeKey)}"
                                >
                                    <textarea
                                        class="fi fi--mono"
                                        rows="16"
                                        style="min-height: 200px"
                                        x-model.debounce.500ms="editText"
                                        @input.debounce.500ms="$store.custom.setPromptOverride(editTarget.routeKey, editText)"
                                    ></textarea>
                                </div>
                                <div class="var-hint mt-1">
                                    XML tags like &lt;role&gt;, &lt;task&gt;,
                                    &lt;rules&gt; structure the prompt for the
                                    AI. Use {{variable}} for dynamic values.
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </template>

            <!-- ═══ SAVE FAVORITE MODAL ═══ -->
            <template x-if="showFavSave">
                <div
                    class="mov"
                    @keydown.tab="trapTab($event)"
                    role="dialog"
                    aria-modal="true"
                    @click.self="showFavSave=false"
                    @keydown.escape.window="showFavSave=false"
                >
                    <div class="modal">
                        <div class="modal__t" x-text="t('favs.save')"></div>
                        <div class="fg">
                            <input
                                type="text"
                                class="fi"
                                :placeholder="t('favs.name_ph')"
                                x-model="favName"

                                autofocus
                            />
                        </div>
                        <div class="flex gap-2 justify-between">
                            <button
                                class="btn"
                                @click="showFavSave=false"
                                x-text="t('common.cancel')"
                            ></button>
                            <button
                                class="btn btn--p"
                                @click="saveFavorite()"
                                x-text="t('common.save')"
                            ></button>
                        </div>
                    </div>
                </div>
            </template>

            <!-- ═══ PLUGIN MANAGER MODAL ═══ -->
            <template x-if="showPlugins">
                <div
                    class="mov"
                    @click.self="showPlugins=false"
                    @keydown.escape.window="showPlugins=false"
                    @keydown.tab="trapTab($event)"
                    role="dialog"
                    aria-modal="true"
                    aria-label="Plugin Manager"
                >
                    <div
                        class="modal"
                        style="
                            max-width: 550px;
                            max-height: 85vh;
                            overflow-y: auto;
                        "
                    >
                        <div class="flex items-center justify-between mb-3">
                            <div
                                class="modal__t"
                                style="margin: 0"
                                x-text="t('plugins.title')"
                            ></div>
                            <button
                                class="btn btn--ghost"
                                @click="showPlugins=false"
                            >
                                ✕
                            </button>
                        </div>

                        <!-- Installed plugins list -->
                        <div class="sl" x-text="t('plugins.installed')"></div>
                        <template x-if="$store.plugins.items.length === 0">
                            <p
                                class="text-sm text-muted mb-3"
                                x-text="t('plugins.none')"
                            ></p>
                        </template>
                        <template
                            x-for="pkg in $store.plugins.items"
                            :key="pkg.meta.id"
                        >
                            <div class="hi mb-2" style="cursor: default">
                                <div class="flex-1">
                                    <div
                                        style="
                                            font-size: 12px;
                                            font-weight: 600;
                                        "
                                    >
                                        <span
                                            x-text="pkg.projectTypes.map(t=>t.icon).join(' ')"
                                        ></span>
                                        <span x-text="pkg.meta.slug"></span>
                                        <span
                                            class="text-faint text-xs"
                                            x-text="'v'+(pkg.meta.version||'1.0')"
                                        ></span>
                                    </div>
                                    <div class="text-xs text-muted">
                                        <span
                                            x-text="pkg.projectTypes.length+' type(s), '"
                                        ></span>
                                        <span
                                            x-text="pkg.projectTypes.reduce((n,t)=>(t.phases||[]).length+n,0)+' phase(s)'"
                                        ></span>
                                        <span
                                            class="text-faint"
                                            x-text="' — by '+(pkg.meta.author||'?')"
                                        ></span>
                                    </div>
                                </div>
                                <div class="flex gap-1">
                                    <button
                                        class="btn btn--sm"
                                        @click="exportPlugin(pkg.meta.id)"
                                        title="Export"
                                    >
                                        ↓
                                    </button>
                                    <button
                                        class="btn btn--sm"
                                        style="color: var(--err)"
                                        @click="if(confirm(t('plugins.confirm_remove'))){$store.plugins.remove(pkg.meta.id)}"
                                        title="Remove"
                                    >
                                        ✕
                                    </button>
                                </div>
                            </div>
                        </template>

                        <!-- Actions -->
                        <div
                            class="flex gap-2 mt-3 mb-2"
                            style="flex-wrap: wrap"
                        >
                            <label
                                class="btn btn--p btn--sm flex-1"
                                style="cursor: pointer; text-align: center"
                            >
                                📂 <span x-text="t('plugins.import')"></span>
                                <input
                                    type="file"
                                    accept=".json"
                                    class="hidden"
                                    @change="importPlugin($event)"
                                />
                            </label>
                            <button
                                class="btn btn--sm flex-1"
                                @click="showPlugins=false;showCreateType=true"
                            >
                                ✨ <span x-text="t('plugins.create')"></span>
                            </button>
                        </div>

                        <div class="var-hint mt-2">
                            Prompt Packages are JSON files containing project
                            types with phases and prompt templates. Create your
                            own, or import packages shared by others.
                        </div>
                    </div>
                </div>
            </template>

                                    x-text="t('plugins.name')"

                                    class="fi"
                                    x-model="newType.name"

                            </div>
                            <div class="fg">
                                <label
                                    class="fl"
                                    x-text="t('plugins.name_en')"
                                ></label>
                                <input
                                    type="text"
                                    class="fi"
                                    x-model="newType.name_en"
                                    placeholder="My Project Type"
                                />

                        </div>
                        <div
                            style="
                                display: grid;
                                grid-template-columns: 1fr 1fr;
                                gap: 8px;
                            "
                        >
                            <div class="fg">
                                <label
                                    class="fl"
                                    x-text="t('plugins.desc')"

                                    class="fi"
                                    x-model="newType.desc"
                                    placeholder="Kurzbeschreibung"

                            <div class="fg">
                                <label
                                    class="fl"
                                    x-text="t('plugins.desc_en')"
                                ></label>
                                <input
                                    type="text"
                                    class="fi"
                                    x-model="newType.desc_en"
                                    placeholder="Short description"
                                />

                                class="fl"
                                x-text="t('plugins.author')"

                                class="fi"
                                x-model="newType.author"
                                placeholder="Your name"

                        <!-- Phases -->

                                        type="text"
                                        class="fi"
                                        style="max-width: 40px"
                                        x-model="phase.icon"
                                        placeholder="📄"

                                        type="text"
                                        class="fi"
                                        x-model="phase.id"
                                        placeholder="phase-id"
                                        style="
                                            max-width: 100px;
                                            font-family: var(--font-m);
                                            font-size: 11px;

                                    />

                                        type="text"
                                        class="fi flex-1"

                                    class="fl text-xs"

                            class="flex gap-2 justify-between"
                            style="
                                border-top: 1px solid var(--bd);
                                padding-top: 10px;
                            "
                        >
                            <button
                                class="btn"
                                @click="showCreateType=false"

                            <button
                                class="btn btn--p"

                        el.style.background = "#2d1b1b";

                    let passed = 0,
