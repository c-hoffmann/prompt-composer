// ── Customization Store (Override Layer) ──
// Architecture: VS Code Settings model (Override-Layer, not Fork-and-Own).
// Research: NNGroup confirms <5% of users modify defaults. This model
// keeps defaults read-only in the HTML, stores only sparse deltas in
// localStorage, and auto-merges on every load. HTML updates propagate
// automatically to non-overridden fields.
Alpine.store('custom', {
  data: (function(){
    var defaults = { _v: 1, overrides: {}, hidden: [], userTypes: {}, userPhases: {}, userPrompts: {} };
    try {
      var raw = storage.getItem('pc-custom');
      if (!raw) return JSON.parse(JSON.stringify(defaults));
      var d = JSON.parse(raw);
      // Deep merge with defaults to fill missing fields
      return Object.assign({}, defaults, d);
    } catch(e) {
      console.warn('Corrupted pc-custom, using defaults');
      storage.removeItem('pc-custom');
      return JSON.parse(JSON.stringify(defaults));
    }
  })(),

  save() {
    try {
      storage.setItem('pc-custom', JSON.stringify(this.data));
    } catch(e) {
      console.warn('Failed to save customizations:', e);
    }
  },

  // Check if a type or phase is hidden
  isHidden(key) {
    return (this.data.hidden || []).includes(key);
  },

  // Toggle visibility of a default type/phase
  toggleHidden(key) {
    const idx = this.data.hidden.indexOf(key);
    if (idx >= 0) {
      this.data.hidden.splice(idx, 1);
    } else {
      this.data.hidden.push(key);
    }
    this.save();
  },

  // Override a prompt block for a specific route
  setPromptOverride(routeKey, text) {
    if (!this.data.overrides) this.data.overrides = {};
    this.data.overrides[routeKey] = text;
    this.save();
  },

  // Get prompt override (or null if not overridden)
  getPromptOverride(routeKey) {
    // Previously: || null treated empty string as no override.
    // Fix: explicit undefined/null check preserves intentionally empty overrides.
    const val = this.data.overrides?.[routeKey];
    return (val !== undefined && val !== null) ? val : null;
  },

  // Clear a specific override
  clearOverride(routeKey) {
    if (this.data.overrides) {
      delete this.data.overrides[routeKey];
      this.save();
    }
  },

  // Add a custom project type
  addCustomType(type) {
    this.data.userTypes[type.id] = type;
    this.save();
  },

  // Remove a custom project type
  removeCustomType(id) {
    delete this.data.userTypes[id];
    // Also remove related phases and prompts
    Object.keys(this.data.userPhases).forEach(k => {
      if (k.startsWith(id + ':')) delete this.data.userPhases[k];
    });
    Object.keys(this.data.userPrompts).forEach(k => {
      if (k.startsWith(id + ':')) delete this.data.userPrompts[k];
    });
    this.save();
  },

  // Reset all customizations
  resetAll() {
    this.data = { _v: 1, overrides: {}, hidden: [], userTypes: {}, userPhases: {}, userPrompts: {} };
    this.save();
  }
});


// ── Plugin Store (Prompt Packages) ──
// Architecture: Plugins are self-contained JSON packages containing
// project types, phases, and prompt templates. They are stored as an
// array in localStorage and merged with built-in types at runtime.
// Format follows the research-validated schema: schemaVersion + meta
// (UUID for uniqueness, slug for readability) + projectTypes array.
Alpine.store('plugins', {
  items: (function(){
    try {
      return JSON.parse(storage.getItem('pc-plugins') || '[]');
    } catch(e) {
      console.warn('Corrupted pc-plugins, resetting');
      storage.removeItem('pc-plugins');
      return [];
    }
  })(),

  save() {
    try { storage.setItem('pc-plugins', JSON.stringify(this.items)); }
    catch(e) { console.warn('Failed to save plugins:', e); }
  },

  // Validate a plugin package before importing
  validate(pkg) {
    const errors = [];
    if (!pkg || typeof pkg !== 'object') return ['Not a valid JSON object'];
    // Previously: accepted any schemaVersion number, including future versions
    // the app can't handle. Fix: reject versions above what we support.
    const MAX_SCHEMA = 1;
    if (!pkg.schemaVersion || typeof pkg.schemaVersion !== 'number') errors.push('Missing schemaVersion');
    else if (pkg.schemaVersion > MAX_SCHEMA) errors.push('Plugin requires schema v' + pkg.schemaVersion + ', app supports v' + MAX_SCHEMA + '. Update the app.');
    if (!pkg.meta || !pkg.meta.id || !pkg.meta.slug) errors.push('Missing meta.id or meta.slug');
    if (!Array.isArray(pkg.projectTypes) || pkg.projectTypes.length === 0) errors.push('No projectTypes');
    if (pkg.projectTypes) {
      pkg.projectTypes.forEach((t, i) => {
        if (!t.id) errors.push('Type ' + i + ': missing id');
        if (!t.name || (!t.name.en && !t.name.de)) errors.push('Type ' + i + ': missing name');
        if (!t.icon) errors.push('Type ' + i + ': missing icon');
        if (!Array.isArray(t.phases) || t.phases.length === 0) errors.push('Type ' + i + ': no phases');
        if (t.phases) {
          t.phases.forEach((p, j) => {
            if (!p.id) errors.push('Type ' + i + ' Phase ' + j + ': missing id');
            if (!p.promptTemplate) errors.push('Type ' + i + ' Phase ' + j + ': missing promptTemplate');
          });
        }
      });
    }
    return errors;
  },

  // Import a plugin package (with collision detection)
  install(pkg) {
    const errors = this.validate(pkg);
    if (errors.length > 0) return { ok: false, errors };

    // Check UUID collision (same plugin, possibly new version)
    const byUUID = this.items.findIndex(p => p.meta.id === pkg.meta.id);
    if (byUUID >= 0) {
      // Update existing
      this.items[byUUID] = pkg;
      this.save();
      return { ok: true, action: 'updated', name: pkg.meta.slug };
    }

    // Check slug collision (different plugin, same name)
    const bySlug = this.items.find(p => p.meta.slug === pkg.meta.slug);
    if (bySlug) {
      return { ok: false, errors: ['slug_conflict'], existing: bySlug };
    }

    // New install
    this.items.push(pkg);
    this.save();
    return { ok: true, action: 'installed', name: pkg.meta.slug };
  },

  // Force install (overwrite slug conflict)
  forceInstall(pkg) {
    this.items = this.items.filter(p => p.meta.slug !== pkg.meta.slug);
    this.items.push(pkg);
    this.save();
    return { ok: true, action: 'replaced' };
  },

  remove(id) {
    this.items = this.items.filter(p => p.meta.id !== id);
    this.save();
  },

  // Get all project types from all plugins
  getAllTypes() {
    const types = [];
    this.items.forEach(pkg => {
      (pkg.projectTypes || []).forEach(t => {
        types.push({
          id: t.id,
          icon: t.icon,
          tk: t.name.de || t.name.en,
          te: t.name.en || t.name.de,
          dk: (t.description || t.name).de || '',
          de: (t.description || t.name).en || '',
          _plugin: pkg.meta.id, // track origin
          _pluginSlug: pkg.meta.slug
        });
      });
    });
    return types;
  },

  // Get phases for a plugin type
  getPhases(typeId) {
    for (const pkg of this.items) {
      const t = (pkg.projectTypes || []).find(pt => pt.id === typeId);
      if (t) {
        return (t.phases || []).map(p => ({
          id: p.id,
          icon: p.icon || '📄',
          tk: (p.name || {}).de || p.id,
          te: (p.name || {}).en || p.id,
          dk: '',
          de: ''
        }));
      }
    }
    return [];
  },

  // Get prompt template for a plugin type+phase
  getPrompt(typeId, phaseId) {
    for (const pkg of this.items) {
      const t = (pkg.projectTypes || []).find(pt => pt.id === typeId);
      if (t) {
        const p = (t.phases || []).find(ph => ph.id === phaseId);
        if (p) return p.promptTemplate;
      }
    }
    return null;
  }
});

// ── Main Composer Component ──
Alpine.data('composer',()=>({
  step:0, // 0=home, 1=type, 2=phase, 3=questions, 4=configure
  projectType:null,
  phase:null,
  questionAnswers:{},
  sectionState:{},
  optState:{},
  modState:{},
  extra:'',
  promptFields:{}, // Per-route form fields for (placeholder) text
  showAdvanced:false,
  editMode:false,
  editPanelOpen:false,
  editTarget:null, // {type:'prompt', routeKey:'script:new'}
  showPlugins:false,
  showCreateType:false,
  newType:{name:'',name_en:'',icon:'🔧',desc:'',desc_en:'',author:'',phases:[{id:'default',name:'Default',name_en:'Default',icon:'📄',prompt:''}]},
  toast:false,
  showSettings:false,
  showFavSave:false,
  favName:'',
  // showPreview moved to $store.layout.showMobilePreview (matchMedia-based)

  showChangelog:false,changelogVersion:'',changelogItems:[],

  // Announce step changes to screen readers
  announceStep() {
    const ann = document.getElementById('sr-announcer');
    if (ann) {
      const stepNames = ['Home','Type','Phase','Questions','Configure'];
      ann.textContent = (stepNames[this.step] || 'Step ' + this.step);
    }
  },

  init(){
    const lastSeen=storage.getItem('pc-version');
    if(lastSeen&&lastSeen!==APP_VERSION){
      this.changelogVersion=APP_VERSION;
      const entry=CHANGELOG[APP_VERSION];
      if(entry){this.changelogItems=entry.changes[this.$store.i18n.locale]||entry.changes.en||[];this.showChangelog=true;}
    }
    storage.setItem('pc-version',APP_VERSION);
    // Auto-detect OS high-contrast preference (WCAG AAA)
    // Research: prefers-contrast: more has 94.76% browser support.
    if (!storage.getItem('pc-theme') && window.matchMedia('(prefers-contrast: more)').matches) {
      this.$store.theme.set('high-contrast');
    }
    // Ctrl+S / Cmd+S keyboard shortcut for quick export
    // Research: File System Access API enables silent saves on Chrome.
    // Previously: export required opening Settings → clicking Export.
    document.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 's') {
        e.preventDefault();
        // Previously: Ctrl+S fired even with modals open (edit panel, settings).
        // Users editing prompt templates expected "save content", not "export all".
        // Fix: only export when no modal is active.
        if (this.showSettings || this.editPanelOpen || this.showPlugins || this.showCreateType || this.showFavSave) return;
        this.exportData();
        this.toast = true; setTimeout(() => this.toast = false, 1500);
      }
    });
    // Listen for OS theme changes
    window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change',e=>{
      if(!storage.getItem('pc-theme')){
        const t=e.matches?'dark':'light';
        document.documentElement.setAttribute('data-theme',t);
        Alpine.store('theme').mode=t;
      }
    });
  },

  // ── Getters ──
  tl(obj){return this.$store.i18n.locale==='en'?(obj.te||obj.tk||''):(obj.tk||obj.te||'');},
  dl(obj){return this.$store.i18n.locale==='en'?(obj.de||obj.dk||''):(obj.dk||obj.de||'');},
  t(key,p){return this.$store.i18n.t(key,p);},
  // Merged types: defaults + custom - hidden
  // Merged types: built-in defaults + plugin types + custom types - hidden
  get allTypes() {
    const custom = this.$store.custom;
    const defaults = TYPES.filter(t => !custom.isHidden(t.id));
    const pluginTypes = this.$store.plugins.getAllTypes();
    const userTypes = Object.values(custom.data.userTypes || {});
    // Deduplicate: plugin types with same ID as built-in take precedence
    // (allows plugins to "replace" built-in types). Previously: no dedup,
    // causing duplicate entries when plugin IDs matched built-in IDs.
    const pluginIds = new Set(pluginTypes.map(t => t.id));
    const userIds = new Set(userTypes.map(t => t.id));
    const filtered = defaults.filter(t => !pluginIds.has(t.id) && !userIds.has(t.id));
    return [...filtered, ...pluginTypes, ...userTypes];
  },
  get typeObj(){return this.allTypes.find(t=>t.id===this.projectType) || TYPES.find(t=>t.id===this.projectType);},
  // Merged phases: built-in + plugin phases - hidden
  get phases(){
    const custom = this.$store.custom;
    const builtIn = (PHASES[this.projectType]||[]).filter(p => !custom.isHidden(this.projectType+':'+p.id));
    if (builtIn.length > 0) return builtIn;
    // Try plugin phases if no built-in phases found
    const pluginPhases = this.$store.plugins.getPhases(this.projectType);
    return pluginPhases;
  },
  get phaseObj(){return this.phases.find(p=>p.id===this.phase);},
  get routeKey(){return this.projectType+':'+this.phase;},
  get route(){return ROUTES[this.routeKey]||{blocks:[],mods:[]};},
  get questions(){return QUESTIONS[this.routeKey];},
  get hasQuestions(){return !!this.questions;},

  // ── Navigation ──
  goHome(){this.step=0;this.projectType=null;this.phase=null;this.announceStep();},
  selectType(id){
    this.projectType=id;this.phase=null;this.step=2;this.announceStep();
    const t=TYPES.find(x=>x.id===id);
    if(t)this.$store.settings.setVar('project_type',this.tl(t));
  },
  selectPhase(id){
    this.phase=id;this.extra='';this.questionAnswers={};
    if(this.hasQuestions){this.step=3;}else{this.step=4;this.initRoute();}
    this.announceStep();
  },
  // Previously: submitQuestions() only advanced the step.
  // Single-select answers were stored in questionAnswers._selected
  // but never written to the vars store, so {{variable}} in prompts
  // always resolved to defaults. Fix: write selected label to var.
  submitQuestions(){
    this.announceStep();
    const q = this.questions;
    if (q && q.varKey && this.questionAnswers._selected) {
      const opt = q.opts.find(o => o.id === this.questionAnswers._selected);
      if (opt) {
        const label = this.$store.i18n.locale === 'en' ? opt.le : opt.lk;
        this.$store.settings.setVar(q.varKey, label);
      }
    }
    this.step=4;this.initRoute();
  },
  skipQuestions(){this.step=4;this.initRoute();this.announceStep();},
  // Previously: goBack() didn't announce step changes to screen readers.
  goBack(){
    if(this.step===4&&this.hasQuestions)this.step=3;
    else if(this.step>=3)this.step=2;
    else if(this.step===2){this.step=1;this.projectType=null;}
    else if(this.step===1)this.step=0;
    this.announceStep();
  },
  // Previously: goToStep didn't announce step changes for cases 1 and 2.
  goToStep(s){
    if(s===0)this.goHome();
    else if(s===1){this.step=1;this.phase=null;this.announceStep();}
    else if(s===2&&this.projectType){this.step=2;this.announceStep();}
  },

  // ── Route Init ──
  initRoute(){
    const r=this.route;
    this.promptFields={}; // Reset per-route fields on route change
    // Init sections
    this.sectionState={};
    (r.sections||[]).forEach(sid=>{this.sectionState[sid]=true;});
    // Previously: optState was set from questionAnswers[qid], but
    // for multi-select questions qid maps to true/false (correct),
    // while for single-select only _selected is set, so individual
    // qids were always undefined → always true (questions had no effect).
    // Fix: default all to true, then respect actual question answers.
    this.optState = {};
    if (r.optMap) {
      Object.entries(r.optMap).forEach(([qid, pid]) => {
        // If user answered questions, use their answers
        if (Object.keys(this.questionAnswers).length > 0) {
          this.optState[pid] = !!this.questionAnswers[qid];
        } else {
          // No answers (skipped) → enable all
          this.optState[pid] = true;
        }
      });
    }
    // Init modifiers
    this.modState={};
    Object.keys(MODIFIERS).forEach(id=>{
      this.modState[id]=(r.mods||[]).includes(id);
    });
  },

  toggleSection(sid){this.sectionState[sid]=!this.sectionState[sid];},
  toggleOpt(pid){this.optState[pid]=!this.optState[pid];},
  toggleMod(mid){
    this.modState[mid]=!this.modState[mid];
    if(mid==='implement'&&this.modState[mid])this.modState['show_only']=false;
    if(mid==='show_only'&&this.modState[mid])this.modState['implement']=false;
  },

  // ── Prompt Assembly ──
  resolveVars(text){
    const v=this.$store.settings.vars;
    return(text||'').replace(/\{\{(\w+)\}\}/g,(m,k)=>{const val=v[k];return(val!==undefined&&val!==null&&val!=='')?val:m;});
  },

  // Get the default (non-overridden) prompt for a route.
  // Used by the edit panel to show the original template as starting point.
  // Previously: only checked built-in ROUTES/P[]. Plugin types returned
  // empty string, making the edit panel show nothing for plugin prompts.
  // Fix: check plugin prompts when built-in route doesn't exist.
  assembleDefaultPrompt(routeKey) {
    const r = ROUTES[routeKey];
    if (r) {
      const parts = [];
      (r.blocks || []).forEach(bid => { if (P[bid]) parts.push(P[bid]); });
      (r.sections || []).forEach(sid => { if (P[sid]) parts.push(P[sid]); });
      if (r.suffix && P[r.suffix]) parts.push(P[r.suffix]);
      return parts.join('\n\n');
    }
    // Try plugin prompt
    const [typeId, phaseId] = routeKey.split(':');
    const pluginPrompt = this.$store.plugins.getPrompt(typeId, phaseId);
    return pluginPrompt || '';
  },

  // Previously: assemblePrompt() and rawPrompt were two nearly identical
  // 35-line methods (copy-paste duplication). Any change to one needed
  // manual replication in the other — a guaranteed source of divergence
  // bugs. Fix: single assemblePrompt() method. rawPrompt is the result
  // before field resolution (stable for extractFields). currentPrompt
  // adds field resolution (for display and copy).
  get rawPrompt(){
    const r=this.route;const parts=[];
    const override = this.$store.custom.getPromptOverride(this.routeKey);
    if (override) {
      parts.push(override);
    } else {
      // Check plugin prompts first (for plugin-provided project types),
      // then fall back to built-in P[] blocks.
      const pluginPrompt = this.$store.plugins.getPrompt(this.projectType, this.phase);
      if (pluginPrompt) {
        parts.push(pluginPrompt);
      } else {
        (r.blocks||[]).forEach(bid=>{if(P[bid])parts.push(P[bid]);});
        (r.sections||[]).forEach(sid=>{
          if(this.sectionState[sid]&&P[sid])parts.push(P[sid]);
        });
        if(r.suffix&&P[r.suffix])parts.push(P[r.suffix]);
        if(r.optMap){
          Object.entries(r.optMap).forEach(([qid,pid])=>{
            if(this.optState[pid]&&P[pid])parts.push(P[pid]);
          });
        }
      }
    } // end override/plugin/builtin
    Object.entries(MODIFIERS).forEach(([id,mod])=>{
      if(this.modState[id])parts.push(mod.text);
    });
    if(this.extra.trim())parts.push(this.extra.trim());
    const outLang=LANGUAGES.find(l=>l.code===this.$store.settings.outputLang);
    if(outLang&&outLang.code!=='en'){
      parts.push('<output_localization>\nProvide all explanations, comments, and prose in '+outLang.label+'. Keep all code, variable names, CLI commands, and technical identifiers in English. Adapt examples and references to be relevant for '+this.$store.settings.country+' where applicable.\n</output_localization>');
    }
    return this.resolveVars(parts.join('\n\n'));
  },
  get currentPrompt(){
    // Full prompt with fields resolved
    return this.resolveFields(this.rawPrompt);
  },
  get currentQuality(){
    return this.analyzeQuality(this.currentPrompt);
  },
  // Previously: HTML tags in user input (Extra field, variables) passed
  // through marked.parse() → x-html unsanitized, breaking the preview
  // layout. Fix: escape user-contributed portions before Markdown parsing.
  getPreviewHtml(){
    const text=this.currentPrompt;
    if(!text)return'';
    // Highlight unresolved variables
    let h=text.replace(/\{\{(\w+)\}\}/g,'<span class="var-hl">{{$1}}</span>');
    // Escape any raw HTML that didn't come from our XML tags
    // (user-typed content in Extra field or variables)
    h=h.replace(/<(?!\/?(?:role|task|rules|output_format|output_localization|background|examples|example|thinking|span)[ >\/])/gi,'&lt;');
    try{return marked.parse(h,{breaks:true,gfm:true});}catch(e){return'<pre>'+h+'</pre>';}
  },

  // Previously: doCopy() called assemblePrompt() directly instead of
  // using the cached currentPrompt getter, causing redundant computation.
  async doCopy(){
    const prompt=this.currentPrompt;
    const ok=await copyToClipboard(prompt);
    if(ok){
      this.toast=true;setTimeout(()=>this.toast=false,1500);
      // Add to history
      const typeObj=this.typeObj;const phaseObj=this.phaseObj;
      this.$store.history.add({
        // Previously: config saved sectionState/optState but loadConfig() didn't restore them.
        // Now both save and load are consistent.
        // Previously: promptFields were not saved, so loading a favorite/history
        // entry lost all filled-in field values.
        config:{type:this.projectType,phase:this.phase,questionAnswers:{...this.questionAnswers},sectionState:{...this.sectionState},optState:{...this.optState},modState:{...this.modState},extra:this.extra,promptFields:{...this.promptFields}},
        preview:prompt.substring(0,120).replace(/\n/g,' '),
        typeName:typeObj?this.tl(typeObj):'',
        phaseName:phaseObj?this.tl(phaseObj):'',
        typeIcon:typeObj?typeObj.icon:'',
      });
    }
  },

  // ── Favorites ──
  saveFavorite(){
    if(!this.favName.trim())return;
    this.$store.favs.add({
      name:this.favName.trim(),
      // Previously: favorites didn't save sectionState/optState, causing
      // section checkboxes to reset when loading a favorite.
      config:{type:this.projectType,phase:this.phase,questionAnswers:{...this.questionAnswers},sectionState:{...this.sectionState},optState:{...this.optState},modState:{...this.modState},extra:this.extra,promptFields:{...this.promptFields}},
      typeName:this.typeObj?this.tl(this.typeObj):'',
      phaseName:this.phaseObj?this.tl(this.phaseObj):'',
      typeIcon:this.typeObj?this.typeObj.icon:'',
    });
    this.favName='';this.showFavSave=false;
  },

  // Previously: loadConfig() called initRoute() which reset sections/opts
  // to defaults, then only restored modState. This lost section selections.
  // Fix: restore all state after initRoute(), including sections and opts.
  loadConfig(config) {
    this.projectType = config.type;
    this.phase = config.phase;
    this.questionAnswers = config.questionAnswers || {};
    this.extra = config.extra || '';
    this.promptFields = {};
    this.step = 4;
    this.initRoute();
    // Restore saved overrides (after initRoute sets defaults)
    if (config.modState) {
      Object.entries(config.modState).forEach(([k, v]) => { this.modState[k] = v; });
    }
    if (config.sectionState) {
      Object.entries(config.sectionState).forEach(([k, v]) => { this.sectionState[k] = v; });
    }
    if (config.optState) {
      Object.entries(config.optState).forEach(([k, v]) => { this.optState[k] = v; });
    }
    // Restore prompt field values (if saved)
    if (config.promptFields) {
      this.promptFields = {...config.promptFields};
    }
  },

  // ── Export/Import ──
  exportData(){
    // Previously: export didn't include the customization store (pc-custom),
    // so user prompt overrides and hidden types were lost on export/import.
    // Previously: export format was v:2 but import didn't check version.
    // Importing old v1 exports into newer apps could fail silently.
    // Fix: bump to v:3 (adds plugins), import validates and warns on mismatch.
    const d={v:3,date:new Date().toISOString(),settings:{outputLang:this.$store.settings.outputLang,country:this.$store.settings.country,vars:this.$store.settings.vars,theme:this.$store.theme.mode,locale:this.$store.i18n.locale},favorites:this.$store.favs.items,history:this.$store.history.items,custom:this.$store.custom.data,plugins:this.$store.plugins.items};
    const blob=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download='prompt-composer-'+new Date().toISOString().slice(0,10)+'.json';a.click();
  },
  importData(ev){
    const file=ev.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        // Safe parse: strips prototype pollution keys from imported data
        const d=safeJsonParse(e.target.result);
        // Warn on very old export format (but still try to import)
        if(d.v && d.v < 2) console.warn('Importing old export format v'+d.v);
        if(d.favorites)this.$store.favs.items=d.favorites;
        if(d.history)this.$store.history.items=d.history;
        if(d.settings){
          if(d.settings.vars)Object.entries(d.settings.vars).forEach(([k,v])=>this.$store.settings.setVar(k,v));
          if(d.settings.outputLang)this.$store.settings.setOutputLang(d.settings.outputLang);
          if(d.settings.country)this.$store.settings.setCountry(d.settings.country);
          if(d.settings.theme)this.$store.theme.set(d.settings.theme);
          if(d.settings.locale)this.$store.i18n.setLocale(d.settings.locale);
        }
        // Previously: import didn't restore customizations.
        if(d.plugins&&Array.isArray(d.plugins)){this.$store.plugins.items=d.plugins;this.$store.plugins.save();}
        if(d.custom){this.$store.custom.data=Object.assign({_v:1,overrides:{},hidden:[],userTypes:{},userPhases:{},userPrompts:{}},d.custom);this.$store.custom.save();}
        this.$store.favs.save();
        this.toast=true;setTimeout(()=>this.toast=false,1500);
      }catch(err){alert('Import failed: '+err.message);}
    };
    reader.readAsText(file);ev.target.value='';
  },

  analyzeQuality(prompt){
    if(!prompt||prompt.length<20)return[];
    const w=[];
    if(!/<role>/i.test(prompt)&&!/you are/i.test(prompt)&&!/act as/i.test(prompt))w.push('quality.no_role');
    if(!/<output_format>/i.test(prompt)&&!/format:/i.test(prompt.toLowerCase())&&!/table|json|markdown|list/i.test(prompt.toLowerCase()))w.push('quality.no_format');
    const words=prompt.split(/\s+/).length;
    if(words<40&&/\b(implement|create|build|design|architect|analyze|optimize)\b/i.test(prompt))w.push('quality.too_short');
    const vague=prompt.match(/\b(maybe|perhaps|somehow|something|stuff|things|etc\.?|various|sort of|kind of)\b/gi);
    if(vague&&vague.length>=2)w.push('quality.too_vague');
    const verbs=prompt.match(/\b(summarize|translate|analyze|create|write|build|implement|review|check|fix|optimize|compare|explain|generate|design|evaluate|test)\b/gi);
    if(verbs&&new Set(verbs.map(v=>v.toLowerCase())).size>=5)w.push('quality.multi_task');
    return w;
  },

  // Get hint info for a variable (label, hint text, example placeholder)
  getVarHint(varName) {
    const h = VARIABLE_HINTS[varName];
    if (!h) return { label: varName, hint: '', example: varName };
    const loc = this.$store.i18n.locale;
    return {
      label: h.label?.[loc] || h.label?.en || varName,
      hint: h.hint?.[loc] || h.hint?.en || '',
      example: h.example || varName
    };
  },

  // Toggle edit mode
  // Focus trap for modals — cycles Tab through focusable elements.
  // Research: WAI-ARIA Dialog (Modal) pattern requires Tab wrapping.
  // Previously: no focus trapping — Tab escaped modals into background.
  trapTab(e) {
    const modal = e.currentTarget;
    const focusable = [...modal.querySelectorAll(
      'button:not([disabled]),[href],input:not([disabled]),select:not([disabled]),textarea:not([disabled]),[tabindex]:not([tabindex="-1"])'
    )].filter(el => el.offsetParent !== null);
    if (!focusable.length) return;
    const first = focusable[0], last = focusable[focusable.length - 1];
    if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
    else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
  },

  // ── Plugin / Package Methods ──

  importPlugin(ev) {
    const file = ev.target.files[0];
    if (!file) return;
    // Previously: no size limit — a large JSON could freeze the browser.
    // Fix: reject files over 1 MB (generous limit for text-only plugins).
    if (file.size > 1024 * 1024) {
      alert('File too large (max 1 MB).');
      ev.target.value = '';
      return;
    }
    const reader = new FileReader();
    reader.onload = e => {
      try {
        // Previously: raw JSON.parse — vulnerable to prototype pollution.
        // Fix: safeJsonParse strips __proto__/constructor/prototype keys.
        const pkg = safeJsonParse(e.target.result);
        const result = this.$store.plugins.install(pkg);
        if (result.ok) {
          this.toast = true; setTimeout(() => this.toast = false, 1500);
        } else if (result.errors && result.errors[0] === 'slug_conflict') {
          if (confirm(this.t('plugins.conflict') + ': ' + pkg.meta.slug + '\n\nReplace?')) {
            this.$store.plugins.forceInstall(pkg);
            this.toast = true; setTimeout(() => this.toast = false, 1500);
          }
        } else {
          alert(this.t('plugins.invalid') + '\n' + result.errors.join('\n'));
        }
      } catch(err) { alert(this.t('plugins.invalid') + ': ' + err.message); }
    };
    reader.readAsText(file);
    ev.target.value = '';
  },

  exportPlugin(pluginId) {
    const pkg = this.$store.plugins.items.find(p => p.meta.id === pluginId);
    if (!pkg) return;
    const blob = new Blob([JSON.stringify(pkg, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = (pkg.meta.slug || 'plugin').replace(/[@/]/g, '-') + '.json';
    a.click();
  },

  // Create a new project type as a plugin package
  saveNewType() {
    const nt = this.newType;
    if (!nt.name.trim()) return;
    const typeId = nt.name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
    // Previously: phases without a prompt were silently dropped.
    // Fix: validate and warn user about incomplete phases before saving.
    const validPhases = nt.phases.filter(p => p.id && p.prompt);
    const droppedCount = nt.phases.length - validPhases.length;
    if (validPhases.length === 0) { alert('Each phase needs an ID and a prompt template.'); return; }
    if (droppedCount > 0 && !confirm(droppedCount + ' phase(s) without prompt will be skipped. Continue?')) return;

    const pkg = {
      schemaVersion: 1,
      meta: {
        id: crypto.randomUUID ? crypto.randomUUID() : 'f' + Date.now() + Math.random().toString(36).slice(2),
        slug: '@custom/' + typeId,
        author: nt.author || 'User',
        version: '1.0.0',
        description: nt.desc || nt.name
      },
      projectTypes: [{
        // Previously: duplicate phase names (e.g. two "Review" phases)
        // produced duplicate IDs. Fix: append index suffix on collision.

        id: typeId,
        icon: nt.icon || '🔧',
        name: { de: nt.name, en: nt.name_en || nt.name },
        description: { de: nt.desc || nt.name, en: nt.desc_en || nt.name_en || nt.name },
        phases: validPhases.map((p, idx) => ({
          id: (function(){
            const base = p.id.toLowerCase().replace(/[^a-z0-9]+/g, '-');
            // Append index if duplicate (e.g. "review" → "review-2")
            return base + (idx > 0 && nt.phases.slice(0, idx).some(q => q.id === p.id) ? '-' + (idx+1) : '');
          })(),
          icon: p.icon || '📄',
          name: { de: p.name || p.id, en: p.name_en || p.name || p.id },
          promptTemplate: p.prompt
        }))
      }]
    };
    const result = this.$store.plugins.install(pkg);
    if (result.ok) {
      this.showCreateType = false;
      this.newType = {name:'',name_en:'',icon:'🔧',desc:'',desc_en:'',author:'',phases:[{id:'default',name:'Default',name_en:'Default',icon:'📄',prompt:''}]};
      this.toast = true; setTimeout(() => this.toast = false, 1500);
    } else {
      alert(result.errors.join('\n'));
    }
  },

  addPhaseToNewType() {
    this.newType.phases.push({id:'',name:'',name_en:'',icon:'📄',prompt:''});
  },

  removePhaseFromNewType(idx) {
    if (this.newType.phases.length > 1) this.newType.phases.splice(idx, 1);
  },

  // Get storage usage info for display in settings
  getStorageInfo() {
    if (storage._isMemory) return { label: 'In-Memory (no persistence)', percent: 0 };
    const info = storage._getUsage();
    return { label: info.usedBytes > 0 ? (info.usedBytes / 1024).toFixed(0) + ' KB / 5 MB (' + info.percentUsed + '%)' : 'Empty', percent: info.percentUsed };
  },

  toggleEditMode() {
    this.editMode = !this.editMode;
    if (!this.editMode) this.editPanelOpen = false;
  },

  // Open edit panel for a specific target
  openEditPanel(target) {
    this.editTarget = target;
    this.editPanelOpen = true;
  },

  // Extract prompt fields: **Label:** (hint text) patterns.
  // These are per-route placeholders that become form inputs.
  // Different from {{variables}} which are global settings.
  // Previously: placeholders like "(describe goal)" stayed as raw text
  // in the prompt. Users had to manually find and replace them in the chat.
  // Fix: extract as form fields, show as inputs, replace when filled.
  extractFields(text) {
    const fields = [];
    const seen = new Set();
    // Match **Label:** (hint text) — the dominant pattern in prompt blocks
    const re = /\*\*([^*]+?)\*\*\s*[:.]?\s*\(([^)]{5,80})\)/g;
    let m;
    while ((m = re.exec(text)) !== null) {
      const label = m[1].trim().replace(/:$/, '');
      const hint = m[2].trim();
      const key = label.toLowerCase().replace(/[^a-z0-9]+/g, '_');
      // Skip duplicates and non-fillable patterns
      if (seen.has(key)) continue;
      // Skip non-fillable patterns: enumerations, instructions, technical lists.
      // Previously: only 3 patterns filtered, causing items like
      // "(CSV/JSON/SQL/Excel)" to appear as form fields.
      if (/^method \d|each step|functions,|\d+ command|subshells|step OK/.test(hint)) continue;
      // Skip if hint is mostly a list of options separated by /
      if ((hint.match(/\//g)||[]).length >= 2 && hint.length < 35) continue;
      seen.add(key);
      fields.push({ key, label, hint, fullMatch: m[0] });
    }
    return fields;
  },

  // Replace filled prompt fields in text
  resolveFields(text) {
    const fields = this.extractFields(text);
    let result = text;
    for (const f of fields) {
      const val = this.promptFields[f.key];
      if (val && val.trim()) {
        // Replace (hint text) with user's input, keep the **Label:**
        result = result.replace(f.fullMatch, '**' + f.label + ':** ' + val.trim());
      }
    }
    return result;
  },

  extractVars(text){
    return[...new Set((text.match(/\{\{(\w+)\}\}/g)||[]).map(m=>m.slice(2,-2)))];
  }
}));
});
</script>

<!-- ═══════════════════════════════════════════════ -->
<!-- APP LAYOUT                                      -->
<!-- ═══════════════════════════════════════════════ -->
<div x-data="composer">
<!-- Screen reader announcer for step changes.
     Research: WCAG SC 2.4.3, VA.gov Design System, ESDC Multi-Step Forms.
     Previously: no SR announcement on step changes — users didn't know
     which step they were on. -->
<!-- Safari file:// warning — shown only when in-memory fallback is active -->
<template x-if="typeof storage !== 'undefined' && storage._isMemory">
  <div style="background:var(--warn);color:#000;padding:6px 12px;font-size:11px;text-align:center">
    ⚠ localStorage unavailable (Safari file://). Settings will not persist. Use Export to save your data.
  </div>
</template>
<div id="sr-announcer" aria-live="polite" role="status" class="sr-only"></div>

<div class="app">

<!-- ═══ MAIN AREA ═══ -->
<div class="app__main">

<!-- Top Bar -->
<div class="topbar">
  <!-- Previously: brand text was not clickable. Standard UX pattern:
       logo/title = home link. -->
  <span class="topbar__brand" @click="goHome()" style="cursor:pointer" role="button" tabindex="0" @keydown.enter="goHome()" aria-label="Home"><span x-text="t('app.title')"></span> <span class="text-xs text-faint" x-text="'v'+APP_VERSION"></span></span>
  <div class="topbar__actions">
    <!-- Output Language -->
    <div class="lang-sel" x-show="step>=4">
      <span x-text="t('settings.out_lang')+':'"></span>
      <select :value="$store.settings.outputLang" @change="$store.settings.setOutputLang($event.target.value)">
        <template x-for="l in LANGUAGES" :key="l.code">
          <option :value="l.code" x-text="l.label" :selected="l.code===$store.settings.outputLang"></option>
        </template>
      </select>
    </div>
    <div style="width:1px;height:16px;background:var(--bd);flex-shrink:0" x-show="step>=4"></div>
    <!-- UI Language -->
    <button class="btn btn--ghost btn--sm" @click="$store.i18n.setLocale($store.i18n.locale==='de'?'en':'de')" x-text="$store.i18n.locale==='de'?'EN':'DE'"></button>
    <!-- Theme -->
    <!-- Previously: theme cycle button required 3 clicks to go back.
         Fix: dropdown select for direct theme access (4 themes). -->
<!-- Previously: :value on <select> didn't reactively select the current option
         in Alpine.js. Fix: :selected on each <option> ensures the dropdown always
         reflects the current theme. Options include short text labels for
         screenreaders and non-emoji systems. -->
    <select class="btn btn--ghost btn--sm" style="cursor:pointer;padding:2px 4px;min-width:0"
            @change="$store.theme.set($event.target.value)"
            :aria-label="t('settings.theme')">
      <option value="light" :selected="$store.theme.mode==='light'">☀️ Light</option>
      <option value="dark" :selected="$store.theme.mode==='dark'">🌙 Dark</option>
      <option value="neon" :selected="$store.theme.mode==='neon'">✨ Neon</option>
      <option value="high-contrast" :selected="$store.theme.mode==='high-contrast'">♿ A11y</option>
    </select>
    <!-- Plugins -->
    <button class="btn btn--ghost btn--sm" @click="showPlugins=true">🧩</button>
    <!-- Edit Mode -->
    <button class="btn btn--ghost btn--sm" @click="toggleEditMode()" :class="{'text-ac':editMode}" x-text="editMode?'✏️':'✏️'"></button>
    <!-- Settings -->
    <button class="btn btn--ghost btn--sm" @click="showSettings=true">⚙</button>
    <!-- Previously: used window.innerWidth in :style which is not reactive.
         Fix: use a CSS class that responds to media queries. -->
    <button class="btn btn--ghost btn--sm" x-show="!$store.layout.isDesktop" @click="$store.layout.togglePreview()">📋</button>
  </div>
</div>

<!-- Step Indicator (only when in funnel) -->
<template x-if="step>=1">
<div>
  <div class="steps">
    <div class="sdot" :class="{'sdot--on':step===1,'sdot--done':step>1}" :aria-current="step===1?'step':false" @click="goToStep(1)">1</div>
    <div class="sline" :class="{'sline--done':step>1}"></div>
    <div class="sdot" :class="{'sdot--on':step===2,'sdot--done':step>2}" :aria-current="step===2?'step':false" @click="goToStep(2)">2</div>
    <div class="sline" :class="{'sline--done':step>2}"></div>
    <div class="sdot" :class="{'sdot--on':step===3||step===4}" :aria-current="step>=3?'step':false" @click="step>=3?goToStep(step):null">3</div>
  </div>
  <div class="slabels">
    <span :class="{'on':step===1}" x-text="t('step.type')"></span>
    <span :class="{'on':step===2}" x-text="t('step.phase')"></span>
    <span :class="{'on':step>=3}" x-text="t('step.configure')"></span>
  </div>
</div>
</template>

<!-- Content Area -->
<div class="pb">

<!-- HOME (step 0) -->
<template x-if="step===0">
<div>
  <h2 style="font-size:18px;font-weight:700;margin-bottom:2px;font-family:var(--font-h)" x-text="t('home.welcome')"></h2>
  <p class="text-sm text-muted mb-3" x-text="t('home.quick_start')"></p>

  <!-- Favorites -->
  <template x-if="$store.favs.items.length>0">
    <div class="home-section">
      <div class="home-section__t">⭐ <span x-text="t('favs.title')"></span></div>
      <template x-for="fav in $store.favs.items" :key="fav.id">
        <div class="hi" @click="loadConfig(fav.config)">
          <span style="font-size:16px" x-text="fav.typeIcon"></span>
          <div class="flex-1">
            <div style="font-size:12px;font-weight:600" x-text="fav.name"></div>
            <div class="text-xs text-faint" x-text="fav.typeName+' → '+fav.phaseName"></div>
          </div>
          <button class="btn btn--ghost btn--sm" @click.stop="$store.favs.remove(fav.id)" style="color:var(--err)">✕</button>
        </div>
      </template>
    </div>
  </template>

  <!-- History -->
  <template x-if="$store.history.items.length>0">
    <div class="home-section">
      <div class="home-section__t">🕐 <span x-text="t('hist.title')"></span></div>
      <template x-for="(h,i) in $store.history.items" :key="i">
        <div class="hi" @click="loadConfig(h.config)">
          <span style="font-size:14px" x-text="h.typeIcon"></span>
          <div class="flex-1">
            <div class="hi__preview" x-text="h.preview"></div>
            <div class="text-xs text-faint mt-1"><span class="tag" x-text="h.typeName"></span> <span x-text="relTime(h.ts)"></span></div>
          </div>
        </div>
      </template>
    </div>
  </template>

  <!-- Previously: a separate "Start" button required an extra click
       before seeing project types. Now types are shown directly on home. -->
  <div class="sl mt-3" x-text="t('step1.title')"></div>
  <div class="cards">
    <!-- In edit mode: show hidden types with reduced opacity and toggle button -->
    <template x-for="tp in editMode ? [...allTypes, ...TYPES.filter(t=>$store.custom.isHidden(t.id))] : allTypes" :key="tp.id">
      <div class="card" @click="selectType(tp.id)">
        <span class="card__i" x-text="tp.icon"></span>
        <span class="card__t" x-text="tl(tp)"></span>
        <span class="card__d" x-text="dl(tp)"></span>
      </div>
    </template>
  </div>
</div>
</template>

<!-- STEP 1: Project Type -->
<template x-if="step===1">
<div>
  <button class="back" @click="goHome()">← <span x-text="t('common.back')"></span></button>
  <h2 style="font-size:18px;font-weight:700;margin-bottom:2px;font-family:var(--font-h)" x-text="t('step1.title')"></h2>
  <p class="text-sm text-muted mb-3" x-text="t('step1.desc')"></p>
  <div class="cards">
    <!-- In edit mode: show hidden types with reduced opacity and toggle button -->
    <template x-for="tp in editMode ? [...allTypes, ...TYPES.filter(t=>$store.custom.isHidden(t.id))] : allTypes" :key="tp.id">
      <div class="card" :class="{'card--on':projectType===tp.id}" @click="selectType(tp.id)">
        <span class="card__i" x-text="tp.icon"></span>
        <span class="card__t" x-text="tl(tp)"></span>
        <span class="card__d" x-text="dl(tp)"></span>
      </div>
    </template>
  </div>
</div>
</template>

<!-- STEP 2: Phase -->
<template x-if="step===2">
<div>
  <button class="back" @click="goBack()">← <span x-text="t('common.back')"></span></button>
  <h2 style="font-size:18px;font-weight:700;margin-bottom:2px;font-family:var(--font-h)" x-text="t('step2.title')"></h2>
  <p class="text-sm text-muted mb-3">
    <span x-text="typeObj?tl(typeObj):''"></span> — <span x-text="t('step2.desc')"></span>
  </p>
  <div class="cards">
    <template x-for="ph in phases" :key="ph.id">
      <div class="card" @click="selectPhase(ph.id)">
        <span class="card__i" x-text="ph.icon"></span>
        <span class="card__t" x-text="tl(ph)"></span>
        <span class="card__d" x-text="dl(ph)"></span>
      </div>
    </template>
  </div>
</div>
</template>

<!-- STEP 3: Quick Questions -->
<template x-if="step===3 && questions">
<div>
  <button class="back" @click="goBack()">← <span x-text="t('common.back')"></span></button>
  <h2 style="font-size:18px;font-weight:700;margin-bottom:2px;font-family:var(--font-h)" x-text="t('step3.title')"></h2>
  <p class="text-sm text-muted mb-3" x-text="$store.i18n.locale==='en'?questions.q.de:questions.q.dk"></p>
  <div class="cards" style="grid-template-columns:repeat(auto-fill,minmax(140px,1fr))">
    <template x-for="opt in questions.opts" :key="opt.id">
      <div class="card" style="padding:10px"
           :class="{'card--on': questions.multi ? questionAnswers[opt.id] : questionAnswers._selected===opt.id}"
           @click="if(questions.multi){questionAnswers[opt.id]=!questionAnswers[opt.id]}else{questionAnswers._selected=opt.id}">
        <span class="card__t" style="font-size:12px" x-text="$store.i18n.locale==='en'?opt.le:opt.lk"></span>
      </div>
    </template>
  </div>
  <div class="flex gap-2 mt-3">
    <button class="btn btn--p btn--lg flex-1" @click="submitQuestions()">→ <span x-text="t('step.configure')"></span></button>
    <button class="btn btn--lg" @click="skipQuestions()" x-text="t('common.skip')"></button>
  </div>
</div>
</template>

<!-- STEP 4: Configure -->
<template x-if="step===4">
<div>
  <button class="back" @click="goBack()">← <span x-text="t('common.back')"></span></button>

  <div class="flex items-center justify-between mb-3" style="flex-wrap:wrap;gap:8px">
    <div>
      <h2 style="font-size:18px;font-weight:700;margin-bottom:1px;font-family:var(--font-h)" x-text="t('step4.title')"></h2>
      <p class="text-xs text-muted">
        <span x-text="typeObj?tl(typeObj):''"></span> → <span x-text="phaseObj?tl(phaseObj):''"></span>
      </p>
    </div>
    <div class="flex gap-1">
      <button class="btn btn--sm" @click="showFavSave=true">⭐ <span x-text="t('favs.save')"></span></button>
      <button class="btn btn--sm" x-show="editMode" @click="openEditPanel({type:'prompt',routeKey:routeKey})" style="color:var(--ac2)">✏️ Edit Prompt</button>
      <button id="btn-copy" class="btn btn--p btn--lg" @click="doCopy()">⎘ <span x-text="t('common.copy')"></span></button>
    </div>
  </div>

  <!-- Variables in this prompt — with inline hints -->
  <!-- Research (NNGroup/Baymard/Material Design 3): inline supporting text
       below fields is the most effective help pattern. Placeholder as sole
       help is an anti-pattern (7 documented usability problems). -->
  <template x-if="extractVars(currentPrompt).filter(v=>v!=='lang'&&v!=='country').length>0">
    <div class="mb-3">
      <div class="sl" x-text="t('config.variables')"></div>
      <template x-for="v in extractVars(currentPrompt).filter(v=>v!=='lang'&&v!=='country')" :key="v">
        <div class="fg">
          <label class="fl" x-text="getVarHint(v).label"></label>
          <input type="text" class="fi" :value="$store.settings.vars[v]||''"
                 @input.debounce.200ms="$store.settings.setVar(v,$event.target.value)"
                 :placeholder="getVarHint(v).example">
          <div class="var-hint" x-show="getVarHint(v).hint" x-text="getVarHint(v).hint"></div>
        </div>
      </template>
    </div>
  </template>

  <!-- Prompt Fields — per-route form inputs for (placeholder) text.
       Previously: placeholders like "(describe goal)" stayed as raw text
       in the prompt. Users had to find and replace them manually.
       Fix: extract as form fields, replace in prompt when filled. -->
  <template x-if="extractFields(rawPrompt).length > 0">
    <div class="mb-3">
      <div class="sl" x-text="t('config.fields')"></div>
      <template x-for="f in extractFields(rawPrompt)" :key="f.key">
        <div class="fg">
          <!-- Bilingual field label: German translation + English original.
               Previously: only English label shown, confusing for DE users.
               Fix: show both so users understand AND can map to prompt. -->
          <label class="fl"><span x-show="$store.i18n.locale!=='en' && FIELD_LABELS_DE[f.label]" x-text="FIELD_LABELS_DE[f.label]" style="margin-right:4px"></span><span x-show="$store.i18n.locale!=='en' && FIELD_LABELS_DE[f.label]" class="text-faint" x-text="'/ '+f.label"></span><span x-show="$store.i18n.locale==='en' || !FIELD_LABELS_DE[f.label]" x-text="f.label"></span></label>
          <input type="text" class="fi"
                 :value="promptFields[f.key] || ''"
                 @input.debounce.300ms="promptFields[f.key]=$event.target.value"
                 :placeholder="$store.i18n.locale!=='en' && FIELD_HINTS_DE[f.hint] ? FIELD_HINTS_DE[f.hint] : f.hint">
          <!-- Previously: hints were always English. Fix: show German translation
               when locale is DE, with English fallback. -->
          <div class="var-hint" x-text="$store.i18n.locale!=='en' && FIELD_HINTS_DE[f.hint] ? FIELD_HINTS_DE[f.hint] : f.hint"></div>
        </div>
      </template>
    </div>
  </template>

  <!-- Progressive Disclosure: Advanced options (sections, modifiers, extra).
       Research (Baymard Institute): 18+ options exceeds thresholds. -->
  <button class="btn btn--sm w-full mb-3" @click="showAdvanced=!showAdvanced">
    <span x-text="showAdvanced ? '\u25be '+t('config.hide_advanced') : '\u25b8 '+t('config.show_advanced')"></span>
    <template x-if="!showAdvanced && Object.values(modState).filter(Boolean).length>0">
      <span style="background:var(--ac);color:var(--ac-tx);border-radius:99px;padding:0 5px;font-size:10px;margin-left:4px" x-text="Object.values(modState).filter(Boolean).length+' \u2713'"></span>
    </template>
  </button>

  <!-- Configurable Sections (inside Advanced) -->
  <template x-if="showAdvanced && route.sections && route.sections.length > 0">
    <div class="mb-3">
      <div class="sl" x-text="t('config.sections')"></div>
      <template x-for="sid in route.sections" :key="sid">
        <div class="chk" :class="{'chk--off':!sectionState[sid]}">
          <label class="chk__head">
            <input type="checkbox" :checked="sectionState[sid]" @change="toggleSection(sid)">
            <span class="chk__l" x-text="SECTION_LABELS[sid] || sid.replace(/_/g,' ')"></span>
          </label>
          <div class="chk__p" x-show="sectionState[sid]" x-text="(P[sid]||'').substring(0,120)+'…'"></div>
        </div>
      </template>
    </div>
  </template>

  <!-- Optimization sub-options (inside Advanced) -->
  <template x-if="showAdvanced && route.optMap && Object.keys(route.optMap).length > 0">
    <div class="mb-3">
      <div class="sl" x-text="t('config.optimize_for')"></div>
      <template x-for="[qid,pid] in Object.entries(route.optMap)" :key="pid">
        <div class="chk" :class="{'chk--off':!optState[pid]}">
          <label class="chk__head">
            <input type="checkbox" :checked="optState[pid]" @change="toggleOpt(pid)">
            <span class="chk__l" x-text="pid.replace('opt_','').replace('text_','').replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase())"></span>
          </label>
        </div>
      </template>
    </div>
  </template>

  <div class="mb-3" x-show="showAdvanced">
    <div class="sl" x-text="t('config.modifiers')"></div>
    <div class="mods">
      <template x-for="[id,mod] in Object.entries(MODIFIERS)" :key="id">
        <label class="mod" :class="{'mod--on':modState[id]}" @click="toggleMod(id)">
          <span x-text="mod.icon"></span>
          <span x-text="$store.i18n.locale==='en'?mod.le:mod.lk"></span>
        </label>
      </template>
    </div>
  </div>

  <div class="mb-3" x-show="showAdvanced">
    <div class="sl" x-text="t('config.extra')"></div>
    <textarea class="fi fi--mono" x-model.debounce.300ms="extra" :placeholder="t('config.extra_ph')" rows="3"></textarea>
  </div>

  <template x-if="currentQuality.length>0">
    <div class="mb-3" style="padding:8px 10px;border:1px solid var(--warn);border-radius:5px;background:rgba(217,119,6,.06)">
      <div style="font-size:11px;font-weight:600;color:var(--warn);margin-bottom:4px" x-text="t('quality.title')"></div>
      <template x-for="w in currentQuality" :key="w">
        <div style="font-size:11px;color:var(--tx-m);padding:1px 0">&#9888; <span x-text="t(w)"></span></div>
      </template>
    </div>
  </template>
  <template x-if="currentQuality.length===0 && currentPrompt.length>100">
    <div class="mb-3" style="padding:6px 10px;border:1px solid var(--ok);border-radius:5px;background:rgba(22,163,74,.06);font-size:11px;color:var(--ok)">
      &#10003; <span x-text="t('quality.good')"></span>
    </div>
  </template>

  <div class="flex justify-between items-center" style="border-top:1px solid var(--bd);padding-top:10px">
    <button class="btn btn--sm" @click="showFavSave=true">⭐</button>
    <button class="btn btn--p btn--lg" @click="doCopy()">⎘ <span x-text="t('common.copy')"></span></button>
  </div>
</div>
</template>

</div><!-- /pb -->
</div><!-- /app__main -->

<!-- ═══ PREVIEW PANEL ═══ -->
<aside class="app__preview" :class="{'app__preview--show':$store.layout.showMobilePreview}">
  <div class="ph">
    <span class="ph__t" x-text="t('preview.title')"></span>
    <div class="flex gap-1">
      <template x-if="step>=4">
        <button class="btn btn--p btn--sm" @click="doCopy()">⎘ <span x-text="t('common.copy')"></span></button>
      </template>
      <button class="btn btn--ghost btn--sm" @click="$store.layout.showMobilePreview=false" x-show="!$store.layout.isDesktop">✕</button>
    </div>
  </div>
  <div class="pb">
    <template x-if="step>=4">
      <div id="prompt-output" class="prose" x-html="getPreviewHtml()"></div>
    </template>
    <template x-if="step<4">
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--tx-f);text-align:center;padding:24px;gap:6px">
        <div style="font-size:28px;opacity:.4">📋</div>
        <p style="font-size:13px" x-text="t('preview.title')"></p>
        <p style="font-size:11px" x-text="t('preview.empty')"></p>
      </div>
    </template>
  </div>
</aside>

</div><!-- /app -->

<!-- ═══ TOAST ═══ -->
<div x-show="toast" x-cloak class="toast" x-text="t('common.copied')"></div>

<template x-if="showChangelog">
  <div class="mov" @keydown.tab="trapTab($event)" role="dialog" aria-modal="true" @click.self="showChangelog=false" @keydown.escape.window="showChangelog=false">
    <div class="modal">
      <div class="modal__t" x-text="t('changelog.title')"></div>
      <p class="text-sm text-muted mb-2">Prompt Composer <span x-text="t('changelog.updated')+' '+changelogVersion"></span></p>
      <ul style="padding-left:1.4em;margin-bottom:12px">
        <template x-for="item in changelogItems" :key="item">
          <li style="font-size:12px;margin-bottom:3px;color:var(--tx-m)" x-text="item"></li>
        </template>
      </ul>
      <button class="btn btn--p w-full" @click="showChangelog=false" x-text="t('common.close')"></button>
    </div>
  </div>
</template>


<!-- ═══ EDIT PANEL (Side Panel) ═══ -->
<!-- Research: Side-Panel pattern (Airtable/Typeform/Zapier) is the industry
     standard for wizard-builder editing. Maintains context while providing
     enough space for configuration. -->
<template x-if="editMode && editPanelOpen && editTarget">
  <div class="mov" @keydown.tab="trapTab($event)" role="dialog" aria-modal="true" @click.self="editPanelOpen=false" @keydown.escape.window="editPanelOpen=false">
    <div class="modal" style="max-width:600px;max-height:90vh">
      <div class="flex items-center justify-between mb-3">
        <div class="modal__t" style="margin:0">
          <span x-text="editTarget?.type==='prompt' ? 'Edit Prompt Template' : 'Edit'"></span>
        </div>
        <div class="flex gap-1">
          <template x-if="editTarget?.type==='prompt' && $store.custom.getPromptOverride(editTarget.routeKey)">
            <button class="btn btn--sm btn--danger" @click="$store.custom.clearOverride(editTarget.routeKey);editPanelOpen=false">Reset to Default</button>
          </template>
          <button class="btn btn--ghost" @click="editPanelOpen=false">✕</button>
        </div>
      </div>

      <!-- Prompt Template Editor -->
      <template x-if="editTarget?.type==='prompt'">
        <div>
          <p class="text-xs text-muted mb-2" x-text="editTarget.routeKey"></p>
          <!-- Previously: :value+@input caused cursor position jumps during editing.
               Fix: x-data creates a local editable copy, synced to store on input. -->
          <div x-data="{editText: $store.custom.getPromptOverride(editTarget.routeKey) || assembleDefaultPrompt(editTarget.routeKey)}">
            <textarea class="fi fi--mono" rows="16" style="min-height:200px"
                      x-model.debounce.500ms="editText"
                      @input.debounce.500ms="$store.custom.setPromptOverride(editTarget.routeKey, editText)"></textarea>
          </div>
          <div class="var-hint mt-1">XML tags like &lt;role&gt;, &lt;task&gt;, &lt;rules&gt; structure the prompt for the AI. Use {{variable}} for dynamic values.</div>
        </div>
      </template>
    </div>
  </div>
</template>

<!-- ═══ SAVE FAVORITE MODAL ═══ -->
<template x-if="showFavSave">
  <div class="mov" @keydown.tab="trapTab($event)" role="dialog" aria-modal="true" @click.self="showFavSave=false" @keydown.escape.window="showFavSave=false">
    <div class="modal">
      <div class="modal__t" x-text="t('favs.save')"></div>
      <div class="fg">
        <input type="text" class="fi" :placeholder="t('favs.name_ph')" x-model="favName" @keydown.enter="saveFavorite()" autofocus>
      </div>
      <div class="flex gap-2 justify-between">
        <button class="btn" @click="showFavSave=false" x-text="t('common.cancel')"></button>
        <button class="btn btn--p" @click="saveFavorite()" x-text="t('common.save')"></button>
      </div>
    </div>
  </div>
</template>


<!-- ═══ PLUGIN MANAGER MODAL ═══ -->
<template x-if="showPlugins">
  <div class="mov" @click.self="showPlugins=false" @keydown.escape.window="showPlugins=false"
       @keydown.tab="trapTab($event)" role="dialog" aria-modal="true" aria-label="Plugin Manager">
    <div class="modal" style="max-width:550px;max-height:85vh;overflow-y:auto">
      <div class="flex items-center justify-between mb-3">
        <div class="modal__t" style="margin:0" x-text="t('plugins.title')"></div>
        <button class="btn btn--ghost" @click="showPlugins=false">✕</button>
      </div>

      <!-- Installed plugins list -->
      <div class="sl" x-text="t('plugins.installed')"></div>
      <template x-if="$store.plugins.items.length === 0">
        <p class="text-sm text-muted mb-3" x-text="t('plugins.none')"></p>
      </template>
      <template x-for="pkg in $store.plugins.items" :key="pkg.meta.id">
        <div class="hi mb-2" style="cursor:default">
          <div class="flex-1">
            <div style="font-size:12px;font-weight:600">
              <span x-text="pkg.projectTypes.map(t=>t.icon).join(' ')"></span>
              <span x-text="pkg.meta.slug"></span>
              <span class="text-faint text-xs" x-text="'v'+(pkg.meta.version||'1.0')"></span>
            </div>
            <div class="text-xs text-muted">
              <span x-text="pkg.projectTypes.length+' type(s), '"></span>
              <span x-text="pkg.projectTypes.reduce((n,t)=>(t.phases||[]).length+n,0)+' phase(s)'"></span>
              <span class="text-faint" x-text="' — by '+(pkg.meta.author||'?')"></span>
            </div>
          </div>
          <div class="flex gap-1">
            <button class="btn btn--sm" @click="exportPlugin(pkg.meta.id)" title="Export">↓</button>
            <button class="btn btn--sm" style="color:var(--err)" @click="if(confirm(t('plugins.confirm_remove'))){$store.plugins.remove(pkg.meta.id)}" title="Remove">✕</button>
          </div>
        </div>
      </template>

      <!-- Actions -->
      <div class="flex gap-2 mt-3 mb-2" style="flex-wrap:wrap">
        <label class="btn btn--p btn--sm flex-1" style="cursor:pointer;text-align:center">
          📂 <span x-text="t('plugins.import')"></span>
          <input type="file" accept=".json" class="hidden" @change="importPlugin($event)">
        </label>
        <button class="btn btn--sm flex-1" @click="showPlugins=false;showCreateType=true">
          ✨ <span x-text="t('plugins.create')"></span>
        </button>
      </div>

      <div class="var-hint mt-2">
        Prompt Packages are JSON files containing project types with phases and prompt templates. Create your own, or import packages shared by others.
      </div>
    </div>
  </div>
</template>

<!-- ═══ CREATE NEW TYPE MODAL ═══ -->
<template x-if="showCreateType">
  <div class="mov" @click.self="showCreateType=false" @keydown.escape.window="showCreateType=false"
       @keydown.tab="trapTab($event)" role="dialog" aria-modal="true">
    <div class="modal" style="max-width:600px;max-height:85vh;overflow-y:auto">
      <div class="flex items-center justify-between mb-3">
        <div class="modal__t" style="margin:0" x-text="t('plugins.create')"></div>
        <button class="btn btn--ghost" @click="showCreateType=false">✕</button>
      </div>

      <!-- Type basics -->
      <div class="fg">
        <label class="fl" x-text="t('plugins.icon')"></label>
        <input type="text" class="fi" x-model="newType.icon" placeholder="🔧" style="max-width:60px">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div class="fg">
          <label class="fl" x-text="t('plugins.name')"></label>
          <input type="text" class="fi" x-model="newType.name" placeholder="Mein Projekttyp">
        </div>
        <div class="fg">
          <label class="fl" x-text="t('plugins.name_en')"></label>
          <input type="text" class="fi" x-model="newType.name_en" placeholder="My Project Type">
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div class="fg">
          <label class="fl" x-text="t('plugins.desc')"></label>
          <input type="text" class="fi" x-model="newType.desc" placeholder="Kurzbeschreibung">
        </div>
        <div class="fg">
          <label class="fl" x-text="t('plugins.desc_en')"></label>
          <input type="text" class="fi" x-model="newType.desc_en" placeholder="Short description">
        </div>
      </div>
      <div class="fg">
        <label class="fl" x-text="t('plugins.author')"></label>
        <input type="text" class="fi" x-model="newType.author" placeholder="Your name">
      </div>

      <!-- Phases -->
      <div class="sl mt-3" x-text="t('plugins.phases')"></div>
      <template x-for="(phase, idx) in newType.phases" :key="idx">
        <div style="border:1px solid var(--bd);border-radius:6px;padding:10px;margin-bottom:8px">
          <div class="flex items-center gap-2 mb-2">
            <input type="text" class="fi" style="max-width:40px" x-model="phase.icon" placeholder="📄">
            <input type="text" class="fi" x-model="phase.id" placeholder="phase-id" style="max-width:100px;font-family:var(--font-m);font-size:11px">
            <input type="text" class="fi flex-1" x-model="phase.name" :placeholder="t('plugins.phase_name')">
            <input type="text" class="fi flex-1" x-model="phase.name_en" :placeholder="t('plugins.phase_name_en')">
            <button class="btn btn--ghost btn--sm" style="color:var(--err)" @click="removePhaseFromNewType(idx)" x-show="newType.phases.length>1">✕</button>
          </div>
          <label class="fl text-xs" x-text="t('plugins.prompt_template')"></label>
          <textarea class="fi fi--mono" rows="5" x-model="phase.prompt" placeholder="<role>You are...</role>\n<task>...</task>"></textarea>
        </div>
      </template>
      <button class="btn btn--sm w-full mb-3" @click="addPhaseToNewType()">+ <span x-text="t('plugins.add_phase')"></span></button>

      <!-- Save -->
      <div class="flex gap-2 justify-between" style="border-top:1px solid var(--bd);padding-top:10px">
        <button class="btn" @click="showCreateType=false" x-text="t('common.cancel')"></button>
        <button class="btn btn--p" @click="saveNewType()" x-text="t('plugins.save')"></button>
      </div>
    </div>
  </div>
</template>

<!-- ═══ SETTINGS MODAL ═══ -->
<template x-if="showSettings">
  <div class="mov" @keydown.tab="trapTab($event)" @click.self="showSettings=false" @keydown.escape.window="showSettings=false" role="dialog" aria-modal="true" aria-label="Settings">
    <div class="modal">
      <div class="flex items-center justify-between mb-3">
        <div class="modal__t" style="margin:0" x-text="t('settings.title')"></div>
        <button class="btn btn--ghost" @click="showSettings=false">✕</button>
      </div>

      <div class="fg">
        <label class="fl" x-text="t('settings.ui_lang')"></label>
        <select class="fi" :value="$store.i18n.locale" @change="$store.i18n.setLocale($event.target.value)">
          <option value="de">Deutsch</option><option value="en">English</option>
        </select>
      </div>

      <div class="fg">
        <label class="fl" x-text="t('settings.out_lang')"></label>
        <select class="fi" :value="$store.settings.outputLang" @change="$store.settings.setOutputLang($event.target.value)">
          <template x-for="l in LANGUAGES" :key="l.code">
            <option :value="l.code" x-text="l.label"></option>
          </template>
        </select>
      </div>

      <div class="fg">
        <label class="fl" x-text="t('settings.country')"></label>
        <select class="fi" :value="$store.settings.country" @change="$store.settings.setCountry($event.target.value)">
          <template x-for="c in COUNTRIES" :key="c">
            <option :value="c" x-text="c"></option>
          </template>
        </select>
      </div>

      <!-- Theme: simplified to reference topbar dropdown.
           Previously: 4 vtab buttons duplicated the topbar theme dropdown.
           Fix: show current theme name, point to dropdown for changing. -->
      <div class="fg">
        <label class="fl" x-text="t('settings.theme')"></label>
        <div class="text-sm" x-text="{'light':'☀️ Light','dark':'🌙 Dark','neon':'✨ Neon','high-contrast':'♿ High Contrast'}[$store.theme.mode]"></div>
      </div>

      <div class="fg">
        <label class="fl" x-text="t('settings.variables')"></label>
        <template x-for="[k,v] in Object.entries($store.settings.vars).filter(([k])=>!['project_type'].includes(k))" :key="k">
          <div class="fg">
            <label class="fl text-mono text-xs" x-text="'{{'+k+'}}'"></label>
            <input type="text" class="fi" style="font-size:12px" :value="v" @input.debounce.200ms="$store.settings.setVar(k,$event.target.value)" :placeholder="k">
          </div>
        </template>
      </div>

      <!-- Storage usage indicator -->
      <div class="fg">
        <label class="fl">Storage</label>
        <div style="background:var(--bg-i);border-radius:4px;height:6px;overflow:hidden;margin-bottom:4px">
          <div :style="'width:'+Math.min(getStorageInfo().percent,100)+'%;height:100%;background:'+(getStorageInfo().percent>80?'var(--err)':'var(--ac)');transition:width .3s'"></div>
        </div>
        <div class="text-xs text-muted" x-text="getStorageInfo().label"></div>
      </div>

      <div style="border-top:1px solid var(--bd);padding-top:10px;margin-top:6px">
        <div class="sl" x-text="t('settings.data')"></div>
        <div class="flex gap-2 mb-2">
          <button class="btn btn--sm flex-1" @click="exportData()">↓ <span x-text="t('common.export')"></span> <span class="text-faint text-xs">(Ctrl+S)</span></button>
          <label class="btn btn--sm flex-1" style="cursor:pointer;text-align:center">
            ↑ <span x-text="t('common.import')"></span>
            <input type="file" accept=".json" class="hidden" @change="importData($event)">
          </label>
        </div>
        <button class="btn btn--danger btn--sm w-full" @click="if(confirm(t('settings.reset_confirm'))){storage.clear();location.reload()}" x-text="t('common.reset')"></button>
      </div>
    </div>
  </div>
</template>

</div><!-- /x-data composer -->

<!-- ═══ INLINE SMOKE TESTS (Willison Pattern) ═══ -->
<!-- Auto-runs on Alpine init. <details> auto-opens ONLY on failure.
     Invisible to users when all tests pass. Validates data integrity:
     routes→blocks, i18n completeness, variable hints coverage.
     Research: Simon Willison's pattern for single-file HTML tools. -->
<details id="smoke-tests" style="position:fixed;bottom:0;right:0;max-width:420px;max-height:50vh;overflow:auto;background:#1a1a2e;color:#c8c8d4;border-radius:8px 0 0 0;font:0.72rem/1.4 monospace;z-index:9999;display:none">
  <summary style="cursor:pointer;padding:6px 12px;color:#7f8fa6;font-size:0.75rem">Tests</summary>
  <pre id="test-output" style="margin:0;padding:8px 12px;white-space:pre-wrap"></pre>
</details>
<script>
document.addEventListener('alpine:initialized', () => {
  // Only run if ?dev_tests is in URL — invisible to end users
  if (!new URLSearchParams(window.location.search).has('dev_tests')) return;
  setTimeout(() => {
    let passed = 0, failed = 0;
    const lines = [];
    function group(name) { lines.push('\n── ' + name + ' ──'); }
    function assert(name, actual, expected) {
      if (actual === expected) { passed++; lines.push(' ✅ ' + name); }
      else { failed++; lines.push(' ❌ ' + name + '\n    expected: ' + JSON.stringify(expected) + '\n         got: ' + JSON.stringify(actual)); }
    }

    // TEST 1: Every route block exists in P
    group('Routes → P[] blocks');
    Object.entries(ROUTES).forEach(([key, val]) => {
      (val.blocks || []).forEach(bid => {
        assert('ROUTE ' + key + ' → P[' + bid + ']', P[bid] !== undefined, true);
      });
    });

    // TEST 2: i18n completeness
    group('i18n (DE ↔ EN)');
    const deKeys = Object.keys(I18N.de || {});
    const enSet = new Set(Object.keys(I18N.en || {}));
    deKeys.forEach(k => assert('EN has "' + k + '"', enSet.has(k), true));
    assert('Same key count', deKeys.length, enSet.size);

    // TEST 3: Alpine stores initialized
    group('Alpine Stores');
    ['i18n', 'theme', 'settings', 'history', 'favs', 'custom', 'plugins'].forEach(name => {
      assert('Store "' + name + '" exists', Alpine.store(name) !== undefined, true);
    });

    // TEST 4: SECTION_LABELS cover all sections in routes
    group('Section Labels');
    const allSections = new Set();
    Object.values(ROUTES).forEach(r => (r.sections || []).forEach(s => allSections.add(s)));
    allSections.forEach(s => {
      assert('SECTION_LABELS["' + s + '"]', SECTION_LABELS[s] !== undefined, true);
    });

    // Show results
    const el = document.getElementById('smoke-tests');
    const out = document.getElementById('test-output');
    lines.unshift(passed + ' passed, ' + failed + ' failed');
    out.textContent = lines.join('\n');
    el.style.display = 'block';
    if (failed > 0) { el.open = true; el.style.background = '#2d1b1b'; }
  }, 100);
});
</script>

<!-- ═══ INLINE SMOKE TESTS (Willison Pattern) ═══ -->
<!-- Auto-runs on Alpine init. <details> auto-opens ONLY on failure.
     Invisible to users when all tests pass. Validates data integrity:
     routes→blocks, i18n completeness, variable hints coverage.
     Research: Simon Willison's pattern for single-file HTML tools. -->
<details id="smoke-tests" style="position:fixed;bottom:0;right:0;max-width:420px;max-height:50vh;overflow:auto;background:#1a1a2e;color:#c8c8d4;border-radius:8px 0 0 0;font:0.72rem/1.4 monospace;z-index:9999;display:none">
  <summary style="cursor:pointer;padding:6px 12px;color:#7f8fa6;font-size:0.75rem">Tests</summary>
  <pre id="test-output" style="margin:0;padding:8px 12px;white-space:pre-wrap"></pre>
</details>
<script>
document.addEventListener('alpine:initialized', () => {
  // Only run if ?dev_tests is in URL — invisible to end users
  if (!new URLSearchParams(window.location.search).has('dev_tests')) return;
  setTimeout(() => {
    let passed = 0, failed = 0;
    const lines = [];
    function group(name) { lines.push('\n── ' + name + ' ──'); }
    function assert(name, actual, expected) {
      if (actual === expected) { passed++; lines.push(' ✅ ' + name); }
      else { failed++; lines.push(' ❌ ' + name + '\n    expected: ' + JSON.stringify(expected) + '\n         got: ' + JSON.stringify(actual)); }
    }

    // TEST 1: Every route block exists in P
    group('Routes → P[] blocks');
    Object.entries(ROUTES).forEach(([key, val]) => {
      (val.blocks || []).forEach(bid => {
        assert('ROUTE ' + key + ' → P[' + bid + ']', P[bid] !== undefined, true);
      });
    });

    // TEST 2: i18n completeness
    group('i18n (DE ↔ EN)');
    const deKeys = Object.keys(I18N.de || {});
    const enSet = new Set(Object.keys(I18N.en || {}));
    deKeys.forEach(k => assert('EN has "' + k + '"', enSet.has(k), true));
    assert('Same key count', deKeys.length, enSet.size);

    // TEST 3: Alpine stores initialized
    group('Alpine Stores');
    ['i18n', 'theme', 'settings', 'history', 'favs', 'custom', 'plugins'].forEach(name => {
      assert('Store "' + name + '" exists', Alpine.store(name) !== undefined, true);
    });

    // TEST 4: SECTION_LABELS cover all sections in routes
    group('Section Labels');
    const allSections = new Set();
    Object.values(ROUTES).forEach(r => (r.sections || []).forEach(s => allSections.add(s)));
    allSections.forEach(s => {
      assert('SECTION_LABELS["' + s + '"]', SECTION_LABELS[s] !== undefined, true);
    });

    // Show results
    const el = document.getElementById('smoke-tests');
    const out = document.getElementById('test-output');
    lines.unshift(passed + ' passed, ' + failed + ' failed');
    out.textContent = lines.join('\n');
    el.style.display = 'block';
    if (failed > 0) { el.open = true; el.style.background = '#2d1b1b'; }
  }, 100);
});
</script>
