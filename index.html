<!DOCTYPE html>
<!-- Previously: default theme was "light". Changed to "neon" for brand identity. -->
<html lang="de" data-theme="neon">
<!--
  ╔═══════════════════════════════════════════════════════════════╗
  ║  Prompt Composer v3.3 — Modular AI Prompt Builder            ║
  ╚═══════════════════════════════════════════════════════════════╝

  WHAT: A guided tool for assembling structured AI prompts.
  HOW:  Open this file in any modern browser. That's it.

  REQUIREMENTS:
  - Any modern browser (Chrome 90+, Firefox 90+, Safari 15+, Edge 90+)
  - No server, no internet, no installation needed
  - Works via file:// (double-click) or any HTTP server

  FEATURES:
  - 11 project types x 3-6 phases (Script, Repo, Text, Mail, Data, etc.)
  - 3 themes: Light, Dark, Neon (Cyberpunk)
  - 2 UI languages (DE/EN), 15 output languages
  - Favorites, history (last 10), 12 modifiers
  - Variable system with inline hints
  - Prompt quality warnings (5 antipatterns)
  - Edit mode: customize prompts (override-layer, defaults preserved)
  - Export/Import all settings as JSON

  DATA STORAGE:
  - All data in browser localStorage (keys: pc-theme, pc-lang, pc-vars, etc.)
  - Nothing leaves your browser. No external requests.
  - Back up via Settings > Export.

  FOR DEVELOPERS:
  - Source: src/style.css, src/data.js, src/app.js, src/template.html
  - Build: python3 build.py
  - Libraries: Alpine.js v3.15.8 + marked.js v17.0.5 (in lib/)
  - Smoke tests: add ?dev_tests to URL
-->
<head>
<!-- FOUC prevention: detect theme before any CSS renders.
     Previously placed before <head> (invalid HTML). Moved inside <head>
     as first element — browsers execute <script> in <head> before
     rendering any content, achieving the same flash-free effect. -->
<!-- FOUC prevention with Safari file:// safety.
     Previously: raw localStorage.getItem crashed on Safari file://.
     Fix: try/catch falls back to OS preference detection. -->
<script>(function(){try{var t=localStorage.getItem('pc-theme')}catch(e){t=null}// Previously: defaulted to light/dark based on OS preference.
     // Changed: default to 'neon' as the brand theme.
     if(!t)t='neon';document.documentElement.setAttribute('data-theme',t)})();</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Prompt Composer</title>
<style>
/* ═══════════════════════════════════════════════════
   PROMPT COMPOSER v3.2 — CSS
   Four themes: Light, Dark, Neon (Cyberpunk), High Contrast (WCAG AAA)
   22 semantic tokens per theme + layout + components
   ═══════════════════════════════════════════════════ */

/* ── Light Theme ── */
:root,html[data-theme="light"]{
  --bg:#fff;--bg-s:#f8fafc;--bg-i:#f1f5f9;--bg-o:rgba(0,0,0,.35);
  --tx:#0f172a;--tx-m:#64748b;--tx-f:#94a3b8;
  --bd:#e2e8f0;--bd-s:#cbd5e1;
  --ac:#2563eb;--ac-h:#1d4ed8;--ac-sub:#dbeafe;--ac-tx:#fff;
  --ac2:#7c3aed;--ac2-sub:#ede9fe;
  --ok:#16a34a;--err:#dc2626;--warn:#d97706;
  --focus:#3b82f6;--sel:#bfdbfe;
  --tag-bg:#e0e7ff;--tag-tx:#3730a3;
  --glow:none;--glow-ac:none;
  --font-h:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --font-b:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --font-m:ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,monospace;
}

/* ── Dark Theme ── */
html[data-theme="dark"]{
  --bg:#0f172a;--bg-s:#1e293b;--bg-i:#0f172a;--bg-o:rgba(0,0,0,.6);
  --tx:#f1f5f9;--tx-m:#94a3b8;--tx-f:#64748b;
  --bd:#334155;--bd-s:#475569;
  --ac:#3b82f6;--ac-h:#60a5fa;--ac-sub:#1e3a5f;--ac-tx:#fff;
  --ac2:#a78bfa;--ac2-sub:#2e1065;
  --ok:#22c55e;--err:#ef4444;--warn:#f59e0b;
  --focus:#60a5fa;--sel:#1e3a5f;
  --tag-bg:#312e81;--tag-tx:#c7d2fe;
  --glow:none;--glow-ac:none;
}

/* ── Neon Theme ── */
html[data-theme="neon"]{
  --bg:#0a0a0f;--bg-s:#12121a;--bg-i:#1a1a2e;--bg-o:rgba(0,0,0,.7);
  --tx:#e0e0e8;--tx-m:#b0b0c0;--tx-f:#7a7a9a;
  --bd:#2a2a3d;--bd-s:#3d3d55;
  --ac:#00e5ff;--ac-h:#00fff7;--ac-sub:rgba(0,229,255,.1);--ac-tx:#0a0a0f;
  --ac2:#ff2a6d;--ac2-sub:rgba(255,42,109,.1);
  --ok:#39ff14;--err:#ff2a6d;--warn:#ffe156;
  --focus:#00e5ff;--sel:rgba(0,229,255,.15);
  --tag-bg:rgba(0,229,255,.12);--tag-tx:#00e5ff;
  --glow:0 0 8px rgba(0,229,255,.25);
  --glow-ac:0 0 12px rgba(0,229,255,.4),0 0 24px rgba(0,229,255,.15);
  /* Research: Bahnschrift (Win10+) and DIN Alternate (macOS) are the most
     futuristic pre-installed system fonts. DIN 1451-inspired geometric
     industrial letterforms. Zero network cost, fully offline.
     Previously: referenced Google Fonts that were never loaded. */
  --font-h:Bahnschrift,'DIN Alternate','Franklin Gothic Medium','Nimbus Sans Narrow',system-ui,sans-serif;
  --font-b:Avenir,'Avenir Next',Corbel,'URW Gothic',system-ui,sans-serif;
}

/* ── High Contrast Theme (WCAG AAA) ──
/* Research: 7:1 contrast for normal text, 4.5:1 for large text.
   Yellow #ffff00 on black = 19.6:1. White on black = 21:1.
   Auto-detected via prefers-contrast: more (94.76% support). */
html[data-theme="high-contrast"]{
  --bg:#000;--bg-s:#111;--bg-i:#1a1a1a;--bg-o:rgba(0,0,0,.9);
  --tx:#fff;--tx-m:#e0e0e0;--tx-f:#c0c0c0;
  --bd:#fff;--bd-s:#ccc;
  --ac:#ffff00;--ac-h:#ffd700;--ac-sub:rgba(255,255,0,.15);--ac-tx:#000;
  --ac2:#74c0fc;--ac2-sub:rgba(116,192,252,.15);
  --ok:#00ff00;--err:#ff4444;--warn:#ffff00;
  --focus:#ffff00;--sel:rgba(255,255,0,.25);
  --tag-bg:rgba(255,255,0,.15);--tag-tx:#ffff00;
  --glow:none;--glow-ac:none;
  --font-h:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --font-b:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --font-m:ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,monospace;
}
/* Windows High Contrast Mode: fix elements that break under forced-colors */
@media(forced-colors:active){
  .card,.panel,.modal,.chk{border:2px solid ButtonText}
  :focus-visible{outline:3px solid Highlight;outline-offset:2px}
}

/* ── Base Reset ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{font-family:var(--font-b);line-height:1.5;color:var(--tx);background:var(--bg);overflow:hidden;height:100vh;-webkit-font-smoothing:antialiased}
::selection{background:var(--sel)}
*:focus-visible{outline:2px solid var(--focus);outline-offset:2px}
[x-cloak]{display:none!important}

/* ── App Layout ── */
.app{display:grid;grid-template-columns:1fr 420px;height:100vh}
@media(max-width:900px){.app{grid-template-columns:1fr}.app__preview{display:none}.app__preview--show{display:flex;position:fixed;inset:0;z-index:40;border:none}}
.app__main{overflow-y:auto;display:flex;flex-direction:column}
.app__preview{background:var(--bg-s);border-left:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}

/* ── Top Bar ── */
.topbar{padding:8px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;background:var(--bg-s);flex-shrink:0;min-height:44px;gap:8px}
.topbar__brand{font-family:var(--font-h);font-size:16px;font-weight:700;letter-spacing:.01em;white-space:nowrap}
html[data-theme="neon"] .topbar__brand{text-shadow:var(--glow);color:var(--ac)}
.topbar__actions{display:flex;align-items:center;gap:4px}

/* ── Panels ── */
.ph{padding:8px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-shrink:0;min-height:40px}
.ph__t{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pb{padding:16px 20px;overflow-y:auto;flex:1}

/* ── Step Indicator ── */
.steps{display:flex;align-items:center;gap:0;padding:12px 20px 0;flex-shrink:0}
.sdot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:2px solid var(--bd);color:var(--tx-f);background:var(--bg);transition:all .15s ease;cursor:pointer;flex-shrink:0;position:relative}
.sdot--on{border-color:var(--ac);background:var(--ac);color:var(--ac-tx)}
.sdot--done{border-color:var(--ok);background:var(--ok);color:#fff}
html[data-theme="neon"] .sdot--on{box-shadow:var(--glow-ac)}
.sline{height:2px;flex:1;background:var(--bd);margin:0 -1px}
.sline--done{background:var(--ok)}
.slabels{display:flex;justify-content:space-between;padding:5px 20px 10px;font-size:10px;color:var(--tx-f);border-bottom:1px solid var(--bd);flex-shrink:0}
.slabels span{text-align:center;flex:1}
.slabels .on{color:var(--ac);font-weight:600}

/* ── Cards Grid ── */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
.card{padding:12px;border:2px solid var(--bd);border-radius:6px;cursor:pointer;transition:all .15s ease;background:var(--bg);display:flex;flex-direction:column;gap:4px;position:relative}
.card:hover{border-color:var(--bd-s);background:var(--bg-s)}
.card--on{border-color:var(--ac);background:var(--ac-sub)}
html[data-theme="neon"] .card{position:relative}
html[data-theme="neon"] .card::after{content:'';position:absolute;inset:0;border-radius:inherit;box-shadow:var(--glow-ac);opacity:0;z-index:-1;transition:opacity .2s ease;will-change:opacity;pointer-events:none}
html[data-theme="neon"] .card:hover::after,html[data-theme="neon"] .card--on::after{opacity:1}
.card__i{font-size:22px;line-height:1}
.card__t{font-size:13px;font-weight:600}
.card__d{font-size:11px;color:var(--tx-m);line-height:1.3}

/* ── Checkboxes ── */
.chk{padding:7px 9px;border:1px solid var(--bd);border-radius:5px;margin-bottom:4px;transition:border-color .15s ease}
.chk:hover{border-color:var(--bd-s)}
.chk--off{opacity:.4}
.chk__h{display:flex;align-items:center;gap:7px;cursor:pointer;user-select:none}
.chk__h input[type="checkbox"]{accent-color:var(--ac);width:14px;height:14px;cursor:pointer}
.chk__l{font-size:12px;font-weight:500}
.chk__p{margin-top:4px;padding:4px 7px;background:var(--bg-i);border-radius:4px;font-size:10px;font-family:var(--font-m);color:var(--tx-m);white-space:pre-wrap;max-height:55px;overflow-y:auto;line-height:1.35}

/* ── Variant Tabs ── */
.vtabs{display:flex;border:1px solid var(--bd);border-radius:5px;overflow:hidden;margin-bottom:10px}
.vtab{flex:1;padding:5px 8px;font-size:11px;font-weight:500;font-family:var(--font-b);cursor:pointer;border:none;background:var(--bg);color:var(--tx-m);transition:all .15s ease;text-align:center}
.vtab:not(:last-child){border-right:1px solid var(--bd)}
.vtab:hover{background:var(--bg-i)}
.vtab--on{background:var(--ac-sub);color:var(--ac);font-weight:600}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:5px;font-size:12px;font-weight:500;font-family:var(--font-b);cursor:pointer;border:1px solid var(--bd);background:var(--bg);color:var(--tx);transition:all .15s ease;white-space:nowrap}
.btn:hover{background:var(--bg-i);border-color:var(--bd-s)}
.btn--p{background:var(--ac);color:var(--ac-tx);border-color:var(--ac)}
.btn--p:hover{background:var(--ac-h)}
html[data-theme="neon"] .btn--p{box-shadow:var(--glow)}
html[data-theme="neon"] .btn--p:hover{box-shadow:var(--glow-ac)}
.btn--lg{padding:9px 18px;font-size:13px}
.btn--sm{padding:3px 7px;font-size:10px}
.btn--ghost{border:none;background:none;color:var(--tx-m);padding:4px 6px}
.btn--ghost:hover{background:var(--bg-i);color:var(--tx)}
.btn--danger{color:var(--err);border-color:var(--err)}
.btn--danger:hover{background:rgba(220,38,38,.08)}

/* ── Forms ── */
.fi{width:100%;padding:6px 9px;border:1px solid var(--bd);border-radius:5px;background:var(--bg);color:var(--tx);font-size:13px;font-family:var(--font-b)}
.fi:focus{border-color:var(--ac);outline:none}
.fi--mono{font-family:var(--font-m);font-size:11px;min-height:50px;resize:vertical;line-height:1.45}
.fl{display:block;font-size:11px;font-weight:500;margin-bottom:3px;color:var(--tx-m)}
.fg{margin-bottom:10px}

/* ── Modifier Pills ── */
.mods{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.mod{padding:3px 9px;border-radius:99px;font-size:10px;font-weight:500;border:1px solid var(--bd);background:var(--bg);color:var(--tx-m);cursor:pointer;transition:all .15s ease;user-select:none;display:flex;align-items:center;gap:3px}
.mod:hover{border-color:var(--bd-s)}
.mod--on{background:var(--ac-sub);border-color:var(--ac);color:var(--ac)}
html[data-theme="neon"] .mod--on{box-shadow:var(--glow)}

/* ── Section Labels ── */
.sl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--tx-f);margin-bottom:6px}

/* ── Tags ── */
.tag{display:inline-block;padding:1px 5px;border-radius:99px;font-size:9px;font-weight:500;background:var(--tag-bg);color:var(--tag-tx)}

/* ── History / Favorites Items ── */
.hi{padding:8px 10px;border:1px solid var(--bd);border-radius:5px;margin-bottom:4px;cursor:pointer;transition:all .15s ease;display:flex;gap:8px;align-items:flex-start}
.hi:hover{border-color:var(--bd-s);background:var(--bg-s)}
.hi__preview{font-size:11px;color:var(--tx-m);line-height:1.3;flex:1;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.hi__meta{display:flex;gap:4px;align-items:center;flex-shrink:0}
.hi__time{font-size:9px;color:var(--tx-f)}
.hi__star{cursor:pointer;font-size:14px;opacity:.4;transition:all .15s}
.hi__star:hover,.hi__star--on{opacity:1;color:var(--warn)}

/* ── Prose (Markdown Preview) ── */
.prose{line-height:1.55;overflow-wrap:break-word;color:var(--tx);font-size:12px}
.prose h1,.prose h2,.prose h3,.prose h4{margin-top:1.2em;margin-bottom:.35em;font-weight:600;line-height:1.25}
.prose h1{font-size:1.5em;border-bottom:1px solid var(--bd);padding-bottom:.2em}
.prose h2{font-size:1.25em;border-bottom:1px solid var(--bd);padding-bottom:.15em}
.prose h3{font-size:1.1em}
.prose p,.prose ul,.prose ol,.prose blockquote,.prose pre,.prose table{margin-top:0;margin-bottom:.75em}
.prose ul,.prose ol{padding-left:1.6em}
.prose li+li{margin-top:.1em}
.prose code{font-family:var(--font-m);font-size:.875em;background:var(--bg-i);padding:.12em .3em;border-radius:3px}
.prose pre{background:var(--bg-i);padding:.7em;border-radius:5px;overflow-x:auto;line-height:1.4}
.prose pre code{background:none;padding:0;font-size:.85em}
.prose blockquote{border-left:3px solid var(--bd-s);padding-left:.7em;color:var(--tx-m);font-style:italic}
.prose table{border-collapse:collapse;width:100%}
.prose th,.prose td{border:1px solid var(--bd);padding:.35em .5em;text-align:left;font-size:.9em}
.prose th{font-weight:600;background:var(--bg-s)}
.prose strong{font-weight:600}
.prose a{color:var(--ac);text-decoration:none}
.prose hr{border:none;border-top:1px solid var(--bd);margin:1em 0}
.prose>:first-child{margin-top:0}
.prose>:last-child{margin-bottom:0}
/* Variable hint — inline supporting text below form fields.
   Research: NNGroup/Baymard recommend permanent inline descriptions
   in "muted" style (small, gray) with sufficient contrast (WCAG 4.5:1).
   Placeholder text alone is an anti-pattern. */
.var-hint{font-size:10px;color:var(--tx-f);margin-top:2px;line-height:1.3;padding:0 2px}

.var-hl{background:var(--ac-sub);padding:1px 3px;border-radius:3px;font-family:var(--font-m);font-size:.9em;color:var(--ac)}

/* ── Toast ── */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ok);color:#fff;padding:7px 18px;border-radius:5px;font-size:12px;font-weight:500;z-index:1000;box-shadow:0 4px 16px rgba(0,0,0,.15);animation:fadeUp .2s ease}
@keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ── Modal ── */
.mov{position:fixed;inset:0;background:var(--bg-o);z-index:100;display:flex;align-items:center;justify-content:center}
.modal{background:var(--bg);border-radius:8px;border:1px solid var(--bd);box-shadow:0 20px 60px rgba(0,0,0,.2);width:92%;max-width:500px;max-height:80vh;overflow-y:auto;padding:16px}
html[data-theme="neon"] .modal{box-shadow:0 0 40px rgba(0,229,255,.1),0 20px 60px rgba(0,0,0,.4)}
.modal__t{font-size:15px;font-weight:600;margin-bottom:10px}

/* ── Back Link ── */
.back{display:inline-flex;align-items:center;gap:3px;font-size:11px;color:var(--tx-m);cursor:pointer;margin-bottom:12px;background:none;border:none;font-family:var(--font-b);padding:3px 0}
.back:hover{color:var(--ac)}

/* ── Home Cards (Favorites / History) ── */
.home-section{margin-bottom:20px}
.home-section__t{font-size:12px;font-weight:600;color:var(--tx-m);margin-bottom:6px;display:flex;align-items:center;gap:6px}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--bd-s)}

/* ── Lang Selector ── */
.lang-sel{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--tx-m)}
.lang-sel select{font-size:11px;font-family:var(--font-b);background:var(--bg);color:var(--tx);border:1px solid var(--bd);border-radius:4px;padding:2px 4px;cursor:pointer}

/* ── Utility ── */
/* .mobile-only removed — now using matchMedia-based layout store */
@media(max-width:900px){}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
.flex{display:flex}.flex-col{flex-direction:column}.items-center{align-items:center}.justify-between{justify-content:space-between}
.gap-1{gap:4px}.gap-2{gap:8px}.gap-3{gap:12px}
.flex-1{flex:1;min-width:0}.flex-wrap{flex-wrap:wrap}
.mt-1{margin-top:4px}.mt-2{margin-top:8px}.mt-3{margin-top:12px}
.mb-1{margin-bottom:4px}.mb-2{margin-bottom:8px}.mb-3{margin-bottom:12px}
.hidden{display:none}
.text-sm{font-size:12px}.text-xs{font-size:10px}
.text-muted{color:var(--tx-m)}.text-faint{color:var(--tx-f)}
.text-mono{font-family:var(--font-m)}
.text-ac{color:var(--ac)}
.w-full{width:100%}
</style>

<script>
// ── Storage Abstraction Layer ──
// Safari blocks localStorage on file:// URLs (throws DOM Exception 18).
// This fallback detects the block and provides in-memory storage so the
// app remains functional (data lost on reload, but no crash).
// Research: WHATWG HTML Issue #3099, Safari behavior since v11+.
//
// Previously: monkey-patched localStorage with _getUsage and _isMemory,
// which is fragile. In-memory fallback lacked key() and length, crashing
// the migration system on Safari. Fix: unified wrapper object that
// delegates to localStorage but adds missing APIs on both code paths.
const storage = (() => {
  let backend;
  try {
    localStorage.setItem('__storage_test', '1');
    localStorage.removeItem('__storage_test');
    backend = localStorage;
  } catch (e) {
    console.warn('localStorage unavailable (Safari file://?) — using in-memory fallback.');
    backend = null;
  }

  if (backend) {
    // Real localStorage — wrap with unified API
    return {
      _isMemory: false,
      getItem: k => backend.getItem(k),
      setItem: (k, v) => { try { backend.setItem(k, v); return true; } catch(e) { console.warn('Storage quota exceeded:', k, e); return false; } },
      removeItem: k => backend.removeItem(k),
      clear: () => backend.clear(),
      get length() { return backend.length; },
      key: i => backend.key(i),
      _getUsage() {
        let chars = 0;
        for (let i = 0; i < backend.length; i++) {
          const k = backend.key(i);
          chars += k.length + (backend.getItem(k) || '').length;
        }
        const used = chars * 2, quota = 5 * 1024 * 1024;
        return { usedBytes: used, percentUsed: +((used / quota) * 100).toFixed(1), remainingKB: +((quota - used) / 1024).toFixed(1) };
      }
    };
  } else {
    // In-memory fallback (Safari file://, private browsing)
    const mem = {};
    return {
      _isMemory: true,
      getItem: k => mem[k] ?? null,
      setItem: (k, v) => { mem[k] = String(v); return true; },
      removeItem: k => { delete mem[k]; },
      clear: () => { Object.keys(mem).forEach(k => delete mem[k]); },
      get length() { return Object.keys(mem).length; },
      key: i => Object.keys(mem)[i] ?? null,
      _getUsage: () => ({ usedBytes: 0, percentUsed: 0, remainingKB: 5120 })
    };
  }
})();

async function copyToClipboard(text){
  if(navigator.clipboard&&window.isSecureContext){try{await navigator.clipboard.writeText(text);return true}catch(e){}}
  const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;opacity:0;left:0;top:0;font-size:16px';
  document.body.appendChild(ta);ta.focus();ta.select();ta.setSelectionRange(0,ta.value.length);

}

// Previously: relTime() returned hardcoded English strings ("2h ago")
// regardless of UI language. Now uses locale-aware formatting.
function relTime(ts) {
  const d = Date.now() - ts;
  const m = 60000, h = 3600000, day = 86400000;
  const locale = Alpine?.store?.('i18n')?.locale || 'en';
  const labels = {
    de: { now: 'gerade eben', m: 'm', h: 'h', d: 'T', ago: ' her' },
    en: { now: 'just now', m: 'm', h: 'h', d: 'd', ago: ' ago' }
  };
  const l = labels[locale] || labels.en;
  if (d < m) return l.now;
  if (d < h) return Math.floor(d / m) + l.m + l.ago;
  if (d < day) return Math.floor(d / h) + l.h + l.ago;
  return Math.floor(d / day) + l.d + l.ago;
}


// ── Safe JSON Parser (Prototype Pollution Defense) ──
// Research: JSON plugins can inject __proto__/constructor/prototype keys
// that poison Object.prototype when merged via Object.assign or spread.
// This reviver strips dangerous keys during JSON.parse itself — before
// any data reaches the application state.
// Previously: raw JSON.parse on plugin imports with no prototype protection.
const DANGEROUS_KEYS = new Set(['__proto__', 'constructor', 'prototype']);
function safeJsonParse(jsonString) {
  return JSON.parse(jsonString, (key, value) =>
    DANGEROUS_KEYS.has(key) ? undefined : value
  );
}

// ── Data Migration System (Version-Chain Pattern) ──
// Research: Sequential migration pattern from IndexedDB onupgradeneeded.
// Each function transforms data from version N to N+1. On load, all
// needed migrations run in sequence. Rules: never delete old migrations,
// never modify deployed ones, make them idempotent.
// Previously: APP_VERSION tracked for changelog but no data migration.
const SCHEMA_VERSION = 2; // Increment when data structure changes

const DATA_MIGRATIONS = {

      } catch(e) {

    // Ensure pc-custom has all required fields
    try {
      const custom = JSON.parse(storage.getItem('pc-custom') || '{}');
      const defaults = { _v: 1, overrides: {}, hidden: [], userTypes: {}, userPhases: {}, userPrompts: {} };
      storage.setItem('pc-custom', JSON.stringify(Object.assign({}, defaults, custom)));
    } catch(e) {}
  }
};

function runDataMigrations() {
  const stored = parseInt(storage.getItem('pc-schema') || '1');
  if (stored >= SCHEMA_VERSION) return;

  // Backup before migrating
  try {
    const backup = {};
    for (let i = 0; i < (storage.length || 0); i++) {
      const k = storage.key ? storage.key(i) : null;
      if (k && k.startsWith('pc-')) backup[k] = storage.getItem(k);
    }
    if (Object.keys(backup).length > 0) {
      storage.setItem('pc-backup-v' + stored, JSON.stringify(backup));
    }
  } catch(e) { console.warn('Migration backup failed:', e); }

  // Run sequential migrations
  try {
    for (let v = stored + 1; v <= SCHEMA_VERSION; v++) {
      if (DATA_MIGRATIONS[v]) {
        DATA_MIGRATIONS[v]();
        console.log('Migration v' + v + ' applied');
      }
    }
    storage.setItem('pc-schema', String(SCHEMA_VERSION));
  } catch(e) {
    console.error('Migration failed:', e);
    // Don't update version — retry on next load
  }
}

// Run migrations before Alpine initializes
runDataMigrations();

document.addEventListener('alpine:init',()=>{

// ── i18n Store ──
Alpine.store('i18n',{
  locale:storage.getItem('pc-lang')||'de',
  // Pluralization via Intl.PluralRules (browser-native, zero bundle size).
  // Research: Intl.PluralRules implements full CLDR plural rules for every
  // language. Pipe-separated values in translation strings enable forms:
  //   'items.count': '1 Phase|{count} Phasen'  (DE: one|other)
  //   'items.count': '{count} élément|{count} éléments' (FR: one|other)
  // Previously: no pluralization support — all strings were static.
  _prCache: {},
  _pr(locale) { return this._prCache[locale] ??= new Intl.PluralRules(locale); },
  t(key, params={}) {
    let s = I18N[this.locale]?.[key] || I18N['en']?.[key] || key;
    const count = typeof params === 'number' ? params : params.count;
    // Handle pipe-separated plural forms
    if (count !== undefined && s.includes('|')) {
      const forms = s.split('|').map(f => f.trim());
      const cat = this._pr(this.locale).select(count);
      // 2 forms: one|other. 3+: zero|one|two|few|many|other
      const idx = forms.length === 2
        ? (cat === 'one' ? 0 : 1)
        : Math.min(Math.max(['zero','one','two','few','many','other'].indexOf(cat), 0), forms.length - 1);
      s = forms[idx];
      if (typeof params === 'number') params = { count };
    }
    return s.replace(/\{\{(\w+)\}\}/g, (_, k) => params[k] ?? `{{${k}}}`);
  },
  // Previously: <html lang> was hardcoded to 'de' regardless of UI language.
  // Fix: update document lang attribute when locale changes for accessibility.
  setLocale(l){this.locale=l;storage.setItem('pc-lang',l);document.documentElement.lang=l;}
});
